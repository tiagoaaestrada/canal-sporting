<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jogos - Canal Sporting</title>

<style>
body {
  font-family: Arial;
  background: #f5f7f6;
  margin: 0;
  font-size: 13px;
}

h1 {
  text-align: center;
  color: #0a5c2a;
  margin: 15px 0;
}

.top-nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: white;
  padding: 8px;
  border-bottom: 1px solid #eee;
}

.top-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #0a5c2a;
}

.layout {
  display: grid;
  grid-template-columns: 1fr 1.3fr 1fr;
  gap: 25px;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.section {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
}

.section h2 {
  font-size: 16px;
  margin-top: 0;
}

/* ================= FLASH MATCH ================= */

.match {
  display: grid;
  grid-template-columns: 110px 1fr;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
  align-items: center;
}

.match-time {
  font-size: 11px;
  color: #666;
}

.match-main {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.team-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.team-logo {
  width: 16px;
  height: 16px;
}

.score {
  margin-left: auto;
  font-weight: bold;
}

.sporting {
  font-weight: bold;
  color: #0a5c2a;
}

.venue {
  font-size: 11px;
  color: #888;
}

.derby {
  background: #fff5f5;
  border-left: 3px solid #cc0000;
  padding-left: 6px;
}

.derby-badge {
  background: #cc0000;
  color: white;
  font-size: 9px;
  padding: 2px 4px;
  border-radius: 3px;
  margin-left: 6px;
}

/* ================= TABLE ================= */

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  padding: 4px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.highlight {
  background: #e6f5ec;
  font-weight: bold;
}
  
.marcador-item {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid #eee;
  font-size: 12px;
}

.marcador-competition {
  margin-top: 10px;
  font-weight: bold;
  font-size: 12px;
}

.mobile-tabs {
  display: none;
}

.mobile-tabs button {
  flex: 1;
  background: none;
  border: none;
  padding: 12px;
  font-weight: 600;
  color: #0a5c2a;
}

.mobile-tabs button.active {
  border-bottom: 3px solid #0a5c2a;
}

.hidden {
  display: none !important;
}
  
@media (max-width: 1000px) {

  .layout {
    grid-template-columns: 1fr;
  }

  .mobile-tabs {
    display: flex;
    background: white;
    border-bottom: 1px solid #eee;
  }

}
  
@media (max-width: 1000px) {
  .layout {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>

<div class="top-nav">
  <a href="/">Feed</a>
  <a href="/jogos.html">Jogos</a>
  <a href="/mercado.html">Transferências</a>
</div>

<div class="mobile-tabs">
  <button class="active" onclick="showTab('jogos')" id="tabJogos">Jogos</button>
  <button onclick="showTab('classificacoes')" id="tabClass">Classificações</button>
  <button onclick="showTab('estatisticas')" id="tabStats">Estatísticas</button>
</div>

<div class="layout">

  <!-- ESQUERDA -->
  <div id="colClassificacoes">

    <div class="section">
      <h2>Primeira Liga</h2>
      <div id="ligaContainer"></div>
    </div>

  <div class="section">
    <h2>UEFA Champions League</h2>
    <div id="championsContainer"></div>
  </div>
    
  </div>

  <!-- CENTRO -->
  <div id="colClassificacoes">
  
    <div class="section">
      <h2>Agenda</h2>
      <div id="agendaContainer"></div>
    </div>
    
    <div class="section">
      <h2>Resultados</h2>
      <div id="resultadosContainer"></div>
    </div>

  </div>

  <!-- DIREITA -->

  <div id="colJogos">

  <div class="section">
    <h2>Estatísticas da Equipa</h2>
    <div id="estatisticasContainer"></div>
  </div>

</div>

</div>

<script>

/* ================= DATA FORMAT ================= */

function formatarDataFlash(d) {
  const date = new Date(d);
  const dia = String(date.getDate()).padStart(2,"0");
  const mes = String(date.getMonth()+1).padStart(2,"0");
  const ano = String(date.getFullYear()).slice(-2);
  const hora = String(date.getHours()).padStart(2,"0");
  const min = String(date.getMinutes()).padStart(2,"0");
  return `${dia}/${mes}/${ano}, ${hora}:${min}`;
}

/* ================= DERBIES ================= */

function isDerbyOrClassico(home, away) {
  const rivais = [
    "Sport Lisboa e Benfica",
    "FC Porto"
  ];

  return (
    (home === "Sporting Clube de Portugal" && rivais.includes(away)) ||
    (away === "Sporting Clube de Portugal" && rivais.includes(home))
  );
}

/* ================= JOGOS ================= */

async function carregarJogos() {

  const res = await fetch("/api/jogos");
  const data = await res.json();

  const proximos = data.porJogar.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const anteriores = data.jogados.sort((a,b)=>new Date(b.date)-new Date(a.date));

  renderLista(proximos, "agendaContainer", false);
  renderLista(anteriores, "resultadosContainer", true);
}

function renderLista(lista, containerId, mostrarResultado) {

  const container = document.getElementById(containerId);
  container.innerHTML = "";

  lista.forEach(j => {

    const sportingHome = j.homeTeam === "Sporting Clube de Portugal";
    const sportingAway = j.awayTeam === "Sporting Clube de Portugal";
    const derby = isDerbyOrClassico(j.homeTeam, j.awayTeam);

    container.innerHTML += `
      <div class="match ${derby ? "derby" : ""}">

        <div class="match-time">
          ${formatarDataFlash(j.date)}
        </div>

        <div class="match-main">

          <div class="team-row ${sportingHome ? "sporting" : ""}">
            <img src="${j.homeCrest}" class="team-logo">
            <span>${j.homeTeam}</span>
            ${mostrarResultado ? `<span class="score">${j.score.home}</span>` : ""}
          </div>

          <div class="team-row ${sportingAway ? "sporting" : ""}">
            <img src="${j.awayCrest}" class="team-logo">
            <span>${j.awayTeam}</span>
            ${mostrarResultado ? `<span class="score">${j.score.away}</span>` : ""}
          </div>

          ${derby ? `<div><span class="derby-badge">CLÁSSICO</span></div>` : ""}

        </div>

      </div>
    `;
  });
}

/* ================= CLASSIFICAÇÕES ================= */

async function carregarClassificacoes() {

  const res = await fetch("/api/classificacao");
  const data = await res.json();

  function gerarTabela(lista) {
    return `
      <table>
        <tr>
          <th>#</th><th>Equipa</th><th>J</th>
          <th>V</th><th>E</th><th>D</th>
          <th>DG</th><th>Pts</th>
        </tr>
        ${lista.map(t => `
          <tr class="${t.team === "Sporting Clube de Portugal" ? "highlight" : ""}">
            <td>${t.position}</td>
            <td>${t.team}</td>
            <td>${t.played}</td>
            <td>${t.won}</td>
            <td>${t.draw}</td>
            <td>${t.lost}</td>
            <td>${t.goalDifference}</td>
            <td>${t.points}</td>
          </tr>
        `).join("")}
      </table>
    `;
  }

  if (data["Primeira Liga"])
    document.getElementById("ligaContainer").innerHTML =
      gerarTabela(data["Primeira Liga"]);

  if (data["UEFA Champions League"])
    document.getElementById("championsContainer").innerHTML =
      gerarTabela(data["UEFA Champions League"]);
}
  
/* ================= ESTATÍSTICAS ================= */
  
  async function carregarEstatisticas() {

  const res = await fetch("/api/jogos");
  const data = await res.json();

  const jogos = data.jogados;

  let totalGolos = 0;
  let totalSofridos = 0;

  let liga = { golos: 0, sofridos: 0 };
  let champions = { golos: 0, sofridos: 0 };

  jogos.forEach(j => {

    const sportingHome = j.homeTeam === "Sporting Clube de Portugal";

    const golosMarcados = sportingHome ? j.score.home : j.score.away;
    const golosSofridos = sportingHome ? j.score.away : j.score.home;

    totalGolos += golosMarcados;
    totalSofridos += golosSofridos;

    if (j.competition === "Primeira Liga") {
      liga.golos += golosMarcados;
      liga.sofridos += golosSofridos;
    }

    if (j.competition === "UEFA Champions League") {
      champions.golos += golosMarcados;
      champions.sofridos += golosSofridos;
    }

  });

  const media = (totalGolos / jogos.length).toFixed(2);

  document.getElementById("estatisticasContainer").innerHTML = `
    <div><strong>Total Golos:</strong> ${totalGolos}</div>
    <div><strong>Total Sofridos:</strong> ${totalSofridos}</div>
    <div><strong>Média Golos/Jogo:</strong> ${media}</div>
    <hr>
    <div><strong>Primeira Liga</strong></div>
    <div>Golos: ${liga.golos}</div>
    <div>Sofridos: ${liga.sofridos}</div>
    <hr>
    <div><strong>Champions</strong></div>
    <div>Golos: ${champions.golos}</div>
    <div>Sofridos: ${champions.sofridos}</div>
  `;
}

  /* ================= MARCADORES ================= */

async function carregarMarcadores() {

  const res = await fetch("/api/marcadores");
  const data = await res.json();

  const container = document.getElementById("marcadoresContainer");
  container.innerHTML = `
    <div style="font-weight:bold;margin-bottom:8px;">
      Total de Golos: ${data.totalGolos}
    </div>
  `;

  Object.keys(data.competicoes).forEach(comp => {

    container.innerHTML += `
      <div class="marcador-competition">${comp}</div>
    `;

    data.competicoes[comp].forEach(j => {
      container.innerHTML += `
        <div class="marcador-item">
          <span>${j.player}</span>
          <span>${j.goals}</span>
        </div>
      `;
    });

  });
}

function showTab(tab) {

  const colJogos = document.getElementById("colJogos");
  const colClass = document.getElementById("colClassificacoes");
  const colStats = document.getElementById("colEstatisticas");

  const tabJogos = document.getElementById("tabJogos");
  const tabClass = document.getElementById("tabClass");
  const tabStats = document.getElementById("tabStats");

  // esconder todas
  colJogos.classList.add("hidden");
  colClass.classList.add("hidden");
  colStats.classList.add("hidden");

  tabJogos.classList.remove("active");
  tabClass.classList.remove("active");
  tabStats.classList.remove("active");

  // mostrar selecionada
  if (tab === "jogos") {
    colJogos.classList.remove("hidden");
    tabJogos.classList.add("active");
  }

  if (tab === "classificacoes") {
    colClass.classList.remove("hidden");
    tabClass.classList.add("active");
  }

  if (tab === "estatisticas") {
    colStats.classList.remove("hidden");
    tabStats.classList.add("active");
  }

}
  
carregarJogos();
carregarClassificacoes();
carregarMarcadores();
carregarEstatisticas();

setInterval(() => {
  carregarJogos();
  carregarClassificacoes();
  carregarMarcadores();
  carregarEstatisticas();
}, 300000);

function initMobileTabs() {
  if (window.innerWidth <= 1000) {
    showTab("jogos");
  } else {
    // Desktop mostra tudo
    document.getElementById("colJogos").classList.remove("hidden");
    document.getElementById("colClassificacoes").classList.remove("hidden");
    document.getElementById("colEstatisticas").classList.remove("hidden");
  }
}

window.addEventListener("load", initMobileTabs);
  
</script>

</body>
</html>
