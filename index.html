<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Canal Sporting</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a5c2a">

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
  font-size: 14px;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= LAYOUT ================= */

.layout {
  max-width: 1300px;
  margin: 40px auto;
  padding: 0 25px 60px 25px;
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 35px;
}

/* ================= CAPAS ================= */

.covers-column {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.cover-box {
  background: white;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 5px 14px rgba(0,0,0,0.06);
  text-align: center;
}

.cover-box h3 {
  margin: 0 0 10px 0;
  font-size: 15px;
}

.cover-box img {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

/* ================= FEED ================= */

.feed {
  background: white;
  padding: 22px 26px;
  border-radius: 16px;
  box-shadow: 0 5px 16px rgba(0,0,0,0.07);
}

.feed-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 12px;
}

.feed-header h2 {
  margin: 0;
  font-size: 18px;
}

#refreshBtn {
  background: #0a5c2a;
  color: white;
  border: none;
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}

.feed-item {
  padding: 12px 0;
  border-bottom: 1px solid #eee;
}

.feed-item:last-child {
  border-bottom: none;
}

.source {
  font-size: 11px;
  font-weight: bold;
  color: #0a5c2a;
  margin-bottom: 5px;
}

.feed-item a {
  text-decoration: none;
  color: #222;
  font-weight: 600;
  line-height: 1.4;
}

.feed-item a:hover {
  color: #0a5c2a;
}

/* Feed toggle */

.feed-controls {
  text-align: center;
  margin-top: 10px;
}

#toggleFeedBtn {
  background: none;
  border: none;
  color: #0a5c2a;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
}

.hidden-news {
  display: none;
}

/* ================= MOBILE ================= */

@media (max-width: 900px) {

  .layout {
    grid-template-columns: 1fr;
    margin: 20px auto;
    padding: 0 15px 40px 15px;
    gap: 20px;
  }

  .covers-column {
    flex-direction: row;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 15px;
  }

  .covers-column::-webkit-scrollbar {
    display: none;
  }

  .cover-box {
    min-width: 100%;          /* largura ideal no mobile */
    max-width: 300px;        /* evita exageros em ecrãs maiores */
    flex-shrink: 0;
    scroll-snap-align: start;
    padding: 14px;
  }

  .cover-box img {
    width: 110%;
    height: auto;
    max-height: 450px;       /* controla altura máxima */
    object-fit: contain;
  }

}

</style>
</head>

<body>

<header class="main-header">
  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>
  <nav class="header-nav">
    <a href="/" id="nav-feed">Feed</a>
    <a href="/jogos.html" id="nav-jogos">Jogos</a>
    <a href="/mercado.html" id="nav-mercado">Transferências</a>
  </nav>
</header>

<div class="layout">

  <!-- CAPAS -->
  <div class="covers-column">

    <div class="cover-box">
      <h3>Record</h3>
      <img id="record-cover" src="/record.png">
    </div>

    <div class="cover-box">
      <h3>A Bola</h3>
      <img id="bola-cover" src="/abola.png">
    </div>

    <div class="cover-box">
      <h3>O Jogo</h3>
      <img id="ojogo-cover" src="/ojogo.png">
    </div>

  </div>

  <!-- FEED -->
  <div class="feed">

    <div class="feed-header">
      <h2>Feed Geral Sporting</h2>
      <button id="refreshBtn">Atualizar</button>
    </div>

    <div id="feed-container">A carregar...</div>

    <div class="feed-controls">
      <button id="toggleFeedBtn">Ver mais ▼</button>
    </div>

  </div>

</div>

<script>

/* ================= FEED ================= */

async function loadFeed() {
  const res = await fetch("/api/feed");
  const data = await res.json();
  const container = document.getElementById("feed-container");
  container.innerHTML = "";

  const today = new Date();

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "feed-item";

    const itemDate = new Date(item.timestamp);

    const isToday =
      itemDate.getDate() === today.getDate() &&
      itemDate.getMonth() === today.getMonth() &&
      itemDate.getFullYear() === today.getFullYear();

    if (!isToday) {
      div.classList.add("hidden-news");
    }

    div.innerHTML = `
      <div class="source">
        ${item.source} • ${item.formattedDate}
      </div>
      <a href="${item.link}" target="_blank">${item.title}</a>
    `;

    container.appendChild(div);
  });
}

document.getElementById("refreshBtn").addEventListener("click", loadFeed);

document.getElementById("toggleFeedBtn").addEventListener("click", function() {
  const hidden = document.querySelectorAll(".hidden-news");
  const isHidden = hidden[0]?.style.display !== "block";

  hidden.forEach(el => {
    el.style.display = isHidden ? "block" : "none";
  });

  this.textContent = isHidden ? "Ver menos ▲" : "Ver mais ▼";
});

/* ================= CAPAS ================= */

async function loadCover(endpoint, imgId) {
  const res = await fetch(endpoint);
  const data = await res.json();
  const img = document.getElementById(imgId);
  img.src = data.cover;
  img.onclick = () => window.open(data.coverLink, "_blank");
}

loadCover("/api/record","record-cover");
loadCover("/api/bola","bola-cover");
loadCover("/api/ojogo","ojogo-cover");

loadFeed();

/* ================= NAV ACTIVE ================= */

const path = window.location.pathname;

if (path === "/" || path === "/index.html") {
  document.getElementById("nav-feed").classList.add("active");
}

if (path.includes("jogos")) {
  document.getElementById("nav-jogos").classList.add("active");
}

if (path.includes("mercado")) {
  document.getElementById("nav-mercado").classList.add("active");
}

/* ================= PWA ================= */

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

</script>

</body>
</html>
