<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transferências - Canal Sporting</title>

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= CONTAINER ================= */

.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px 60px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.section-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
  padding-bottom: 8px;
}

.section-title.entradas {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

.section-title.saidas {
  color: #b30000;
  border-bottom: 3px solid #b30000;
}

/* ================= CARD ================= */

.transfer-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f5f5f5;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
}

.transfer-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;   /* CENTRA */
  text-align: center;    /* CENTRA TEXTO */
}
	
.transfer-main h2 {
  margin-bottom: 8px;
  font-size: 22px;
}

.player-meta {
  font-size: 14px;
  color: #555;
  margin: 5px 0;
}

.transfer-line {
  margin-top: 10px;
}

.transfer-line {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-weight: 600;
}

.transfer-line .arrow {
  font-size: 18px;
  margin: 4px 0;
  color: #666;
}

.transfer-line .club {
  text-align: center;
  line-height: 1.3;
}
	
	.transfer-side {
  display: flex;
  flex-direction: column;
  align-items: center;   /* centraliza horizontalmente */
  justify-content: center; /* centraliza verticalmente */
  gap: 8px;
}
	
.badge {
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: bold;
}

.badge.rumor {
  background: orange;
}

.badge.oficial {
  background: green;
  color: white;
}

.news-link {
  display: block;
  margin-top: 10px;
  text-decoration: none;
}

@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
}

.btn-player, .btn-news {
  display: inline-block;
  margin-top: 8px;
  margin-right: 8px;
  padding: 6px 12px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
}

.btn-player {
  background-color: #0a7d34;
  color: white;
}

.btn-news {
  background-color: #1d4ed8;
  color: white;
}

.btn-player:hover {
  background-color: #065f2a;
}

.btn-news:hover {
  background-color: #1e40af;
}
	
</style>
</head>

<body>

<header class="main-header">
  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>
  <nav class="header-nav">
    <a href="/">Feed</a>
    <a href="/jogos.html">Jogos</a>
    <a href="/mercado.html" class="active">Transferências</a>
  </nav>
</header>

<div class="container">

  <div>
    <div class="section-title entradas">🟢 Entradas</div>
    <div id="entradas"></div>
  </div>

  <div>
    <div class="section-title saidas">🔴 Saídas</div>
    <div id="saidas"></div>
  </div>

</div>

<script>

async function loadMercado() {

  const res = await fetch("/api/mercado");
  const data = await res.json();

  const todos = [
    ...(data.sporting || []),
    ...(data.nacional || []),
    ...(data.internacional || [])
  ];

  const entradasContainer = document.getElementById("entradas");
  const saidasContainer = document.getElementById("saidas");

  entradasContainer.innerHTML = "";
  saidasContainer.innerHTML = "";

  for (const item of todos) {

    if (!item.playerName) continue;

    const tipo = item.type || "entrada";
    const status = item.status || "rumor";

    const card = document.createElement("div");
    card.className = "transfer-card";

    card.innerHTML = `
      <div class="transfer-main">
        <h2>${item.playerName}</h2>

        <div class="transfer-line">
		  <div class="club from">
		    ${item.fromClub || "?"}
		  </div>
		
		  <div class="arrow">
		    ↓
		  </div>
		
		  <div class="club to">
		    ${item.toClub || "?"}
		  </div>
		</div>
      </div>

      <div class="transfer-side">
        <span class="badge ${status}">
          ${status === "oficial" ? "OFICIAL" : "RUMOR"}
        </span>

        <div class="buttons">
          <a href="${item.zerozeroLink}" target="_blank" class="btn-player">
            👤 Ver jogador
          </a>

          <a href="${item.link}" target="_blank" class="btn-news">
            📰 Ver notícia
          </a>
        </div>
      </div>
    `;

    if (tipo === "saida") {
      saidasContainer.appendChild(card);
    } else {
      entradasContainer.appendChild(card);
    }
  }
}

loadMercado();

</script>

</body>
</html>
