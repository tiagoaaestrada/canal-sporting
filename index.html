<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<title>Canal Sporting</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 0;
  text-align: center;
}

h1 {
  color: #0a5c2a;
  margin: 30px 0 10px 0;
}

.top-bar {
  margin-bottom: 20px;
}

#last-update {
  font-size: 14px;
  color: #555;
  margin-bottom: 10px;
}

button {
  padding: 8px 14px;
  background-color: #0a5c2a;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
  font-size: 13px;
}

button.active {
  background-color: #083d1c;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  flex-wrap: wrap;
  align-items: flex-start;
}

.column {
  background: #f3f3f3;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  width: 360px;
}

.column h2 {
  color: #0a5c2a;
}

.column img {
  width: 100%;
  height: auto;
  max-height: 520px;
  object-fit: contain;
  margin: 0 auto 20px auto;
  border-radius: 6px;
  cursor: pointer;
}

.news {
  text-align: left;
}

.news a {
  display: block;
  margin-bottom: 8px;
  color: #0a5c2a;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
}

.news a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>

<div class="top-bar">
  <div id="last-update"></div>

  <button onclick="setFilter('all')" id="btn-all" class="active">Todas</button>
  <button onclick="setFilter('futebol')" id="btn-futebol">Futebol</button>
  <button onclick="setFilter('andebol')" id="btn-andebol">Andebol</button>
  <button onclick="setFilter('futsal')" id="btn-futsal">Futsal</button>
  <button onclick="setFilter('outros')" id="btn-outros">Outros</button>
</div>

<div class="container">

  <div class="column">
    <h2>Record</h2>
    <img id="record-cover" src="/record.png" />
    <div id="record-news" class="news"></div>
  </div>

  <div class="column">
    <h2>A Bola</h2>
    <img id="bola-cover" src="/abola.png" />
    <div id="bola-news" class="news"></div>
  </div>

  <div class="column">
    <h2>O Jogo</h2>
    <img id="ojogo-cover" src="/ojogo.png" />
    <div id="ojogo-news" class="news"></div>
  </div>

</div>

<script>

let currentFilter = "all";

function setFilter(filter) {
  currentFilter = filter;

  document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
  document.getElementById("btn-" + filter).classList.add("active");

  loadAll();
}

function updateLastUpdateTime() {
  const now = new Date();
  const time = now.toLocaleTimeString("pt-PT", {
    hour: "2-digit",
    minute: "2-digit"
  });

  document.getElementById("last-update").textContent =
    "Última atualização: " + time;
}

function filterNews(news) {
  if (currentFilter === "all") return news;

  return news.filter(item => {
    const title = item.title.toLowerCase();

    const isFutebol = title.includes("futebol") || title.includes("liga") || title.includes("benfica") || title.includes("porto");
    const isFutsal = title.includes("futsal");
    const isAndebol = title.includes("andebol");

    if (currentFilter === "futebol") return isFutebol;
    if (currentFilter === "futsal") return isFutsal;
    if (currentFilter === "andebol") return isAndebol;
    if (currentFilter === "outros") return !isFutebol && !isFutsal && !isAndebol;

    return true;
  });
}

async function loadJournal(endpoint, coverId, newsId) {
  try {
    const response = await fetch(endpoint + "?t=" + new Date().getTime());
    const data = await response.json();

    const img = document.getElementById(coverId);
    const newsContainer = document.getElementById(newsId);

    if (data.cover) {
      img.src = data.cover;
    }

    if (data.coverLink) {
      img.onclick = () => {
        window.open(data.coverLink, "_blank");
      };
    }

    newsContainer.innerHTML = "";

    const filteredNews = filterNews(data.news);

    if (filteredNews && filteredNews.length > 0) {
      filteredNews.forEach(item => {
        const link = document.createElement("a");
        link.href = item.link;
        link.target = "_blank";
        link.textContent = item.title;
        newsContainer.appendChild(link);
      });
    }

  } catch (error) {
    console.error("Erro ao carregar:", endpoint, error);
  }
}

function loadAll() {
  loadJournal("/api/record", "record-cover", "record-news");
  loadJournal("/api/bola", "bola-cover", "bola-news");
  loadJournal("/api/ojogo", "ojogo-cover", "ojogo-news");
  updateLastUpdateTime();
}

loadAll();

</script>

</body>
</html>
