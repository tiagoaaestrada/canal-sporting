<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transferências - Canal Sporting</title>

<style>

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 15px 0 5px 0;
  text-align: center;
}

.header-title a {
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 10px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

@media (max-width: 768px) {
  .header-nav {
    gap: 18px;
    font-size: 14px;
  }
}
  
body {
  font-family: Arial;
  background: #f5f7f6;
  margin: 0;
  padding: 0;
}

h1 {
  text-align: center;
  color: #0a5c2a;
  margin: 20px 0;
}

.top-nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: white;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.top-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #0a5c2a;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.mercado-section {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.mercado-section a {
  display: block;
  margin-bottom: 6px;
  text-decoration: none;
  color: #333;
}
</style>
</head>

<body>
  
<header class="main-header">

  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>

  <nav class="header-nav">
    <a href="/" id="nav-feed">Feed</a>
    <a href="/jogos.html" id="nav-jogos">Jogos</a>
    <a href="/mercado.html" id="nav-mercado">Transferências</a>
  </nav>

</header>

<div class="container">

  <div class="mercado-section">
    <h3>Sporting</h3>
    <div id="mercado-sporting"></div>
  </div>

  <div class="mercado-section">
    <h3>Nacional</h3>
    <div id="mercado-nacional"></div>
  </div>

  <div class="mercado-section">
    <h3>Internacional</h3>
    <div id="mercado-internacional"></div>
  </div>

</div>

<script>
async function loadMercado() {
  const res = await fetch("/api/mercado");
  const data = await res.json();

  ["sporting","nacional","internacional"].forEach(section => {
    const container = document.getElementById("mercado-"+section);
    container.innerHTML = "";
    data[section].forEach(item => {
      const a = document.createElement("a");
      a.href = item.link;
      a.target = "_blank";
      a.textContent = `${item.title} (${item.formattedDate})`;
      container.appendChild(a);
    });
  });
}

loadMercado();

/* ================= NAV ACTIVE ================= */

const path = window.location.pathname;

if (path === "/" || path === "/index.html") {
  document.getElementById("nav-feed")?.classList.add("active");
}

if (path.includes("jogos")) {
  document.getElementById("nav-jogos")?.classList.add("active");
}

if (path.includes("mercado")) {
  document.getElementById("nav-mercado")?.classList.add("active");
}
  
</script>

</body>
</html>
