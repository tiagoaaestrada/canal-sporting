<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jogos - Canal Sporting</title>

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
  font-size: 14px;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= LAYOUT ================= */

.layout {
  max-width: 1300px;
  margin: 40px auto;
  padding: 0 25px 60px 25px;
  display: grid;
  grid-template-columns: 420px 1fr 260px;
  gap: 35px;
}

.section {
  background: white;
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.section h2 {
  margin-top: 0;
  font-size: 18px;
}

/* ================= MATCH ================= */

.match {
  display: grid;
  grid-template-columns: 120px 1fr;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.match:last-child {
  border-bottom: none;
}

.match-time {
  font-size: 12px;
  color: #777;
}

.match-main {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.team-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.score {
  margin-left: auto;
  font-weight: bold;
}

.sporting {
  font-weight: bold;
  color: #0a5c2a;
  background: #e6f5ec;
  padding: 2px 6px;
  border-radius: 6px;
}

/* ===== COMPETIÇÕES ===== */

.comp-badge {
  display: inline-block;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 600;
}

.comp-liga {
  background: #f7f5ad;
  color: #000000;
}

.comp-champions {
  background: #e6ecff;
  color: #1a2e8a;
}

.comp-taca {
  background: #fff0f0;
  color: #a00000;
}

.comp-liga-taca {
  background: #fff6e6;
  color: #b36b00;
}

/* ===== CLÁSSICO DISCRETO ===== */

.derby-label {
  font-size: 10px;
  background: #cc0000;
  color: white;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
}

/* ================= TABLE ================= */

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 6px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.highlight {
  background: #e6f5ec;
  font-weight: bold;
}

@media (max-width: 900px) {

  .layout {
    grid-template-columns: 1fr;
  }

  .col-jogos {
    order: 1;
  }

  .col-classificacao {
    order: 2;
  }

  .col-estatisticas {
    order: 3;
  }

}

/* ===== MOBILE TABS ===== */

.mobile-tabs {
  display: none;
}

@media (max-width: 900px) {

  .mobile-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .tab-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #eee;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .tab-btn.active {
    background: #0a5c2a;
    color: white;
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

}
  
</style>
</head>

<body>

<header class="main-header">
  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>
  <nav class="header-nav">
    <a href="/">Feed</a>
    <a href="/jogos.html" class="active">Jogos</a>
    <a href="/mercado.html">Transferências</a>
  </nav>
</header>

<div class="layout">
  
  <div class="mobile-tabs">
    <button class="tab-btn active" data-tab="jogos" onclick="mostrarTab('jogos')">Jogos</button>
    <button class="tab-btn" data-tab="classificacao" onclick="mostrarTab('classificacao')">Classificação</button>
    <button class="tab-btn" data-tab="estatisticas" onclick="mostrarTab('estatisticas')">Estatísticas</button>
</div>

<!-- CLASSIFICAÇÕES -->
<div class="col-classificacao tab-content" data-tab="classificacao">
  <div class="section">
    <h2>Primeira Liga</h2>
    <div id="ligaContainer"></div>
  </div>
</div>

<!-- JOGOS -->
<div class="col-jogos tab-content" data-tab="jogos">
    <div class="section">
      <h2>Agenda</h2>
      <div id="agendaContainer"></div>
    </div>

    <div class="section" style="margin-top:25px;">
      <h2>Resultados</h2>
      <div id="resultadosContainer"></div>
    </div>
  </div>

  <!-- ESTATÍSTICAS -->
<div class="col-estatisticas tab-content" data-tab="estatisticas">
    <div class="section">
      <h2>Estatísticas da Equipa</h2>
      <div id="estatisticasContainer"></div>
    </div>
  </div>

</div>

<script>

/* ================= DATA ================= */

function formatarData(d) {
  const date = new Date(d);
  const dia = String(date.getDate()).padStart(2,"0");
  const mes = String(date.getMonth()+1).padStart(2,"0");
  const ano = String(date.getFullYear()).slice(-2);
  const hora = String(date.getHours()).padStart(2,"0");
  const min = String(date.getMinutes()).padStart(2,"0");
  return `${dia}/${mes}/${ano}, ${hora}:${min}`;
}

/* ================= DERBY ================= */

function isDerby(home, away) {
  return (
    (home.includes("Sporting") &&
     (away.includes("Porto") || away.includes("Benfica"))) ||
    (away.includes("Sporting") &&
     (home.includes("Porto") || home.includes("Benfica")))
  );
}

/* ================= RENDER JOGOS ================= */

function getCompetitionClass(name) {

  const n = name.toLowerCase();

  if (n.includes("champions"))
    return "comp-champions";

  if (n.includes("taça de portugal") || n.includes("taca de portugal"))
    return "comp-taca";

  if (n.includes("taça da liga") || n.includes("taca da liga"))
    return "comp-liga-taca";

  return "comp-liga";
}

function normalizarNomeEquipa(nome) {

  if (!nome) return "";

  // Remove qualquer emoji ou símbolo gráfico
  nome = nome.replace(/[^\p{L}\p{N}\s\.\-]/gu, "").trim();

  const lower = nome.toLowerCase();

  if (
    lower === "sporting cp" ||
    lower === "sporting" ||
    lower === "sporting clube de portugal"
  ) {
    return "Sporting Clube de Portugal";
  }

  return nome;
}
  
function render(lista, containerId, mostrarResultado) {

  const container = document.getElementById(containerId);
  container.innerHTML = "";

  if (!lista.length) {
    container.innerHTML = "<div style='color:#777;'>Sem jogos.</div>";
    return;
  }

  const maxVisiveis = 3;
  const precisaBotao = lista.length > maxVisiveis;

  const jogosParaMostrar = precisaBotao
    ? lista.slice(0, maxVisiveis)
    : lista;

  jogosParaMostrar.forEach(j => {

    const homeName = normalizarNomeEquipa(j.homeTeam);
    const awayName = normalizarNomeEquipa(j.awayTeam);
    
    const sportingHome = homeName === "Sporting Clube de Portugal";
    const sportingAway = awayName === "Sporting Clube de Portugal";
    const derby = isDerby(j.homeTeam, j.awayTeam);

    const scoreHome = (mostrarResultado && j.score.home !== null)
      ? `<span class="score">${j.score.home}</span>`
      : "";

    const scoreAway = (mostrarResultado && j.score.away !== null)
      ? `<span class="score">${j.score.away}</span>`
      : "";

    container.innerHTML += `
      <div class="match">
        <div class="match-time">
          ${formatarData(j.date)}
        </div>
        <div class="match-main">

          <div>
            <span class="comp-badge ${getCompetitionClass(j.competition)}">
              ${j.competition}
            </span>
            ${derby ? `<span class="derby-label">CLÁSSICO</span>` : ""}
          </div>

          <div class="team-row ${sportingHome ? "sporting" : ""}">
            ${homeName}
            ${scoreHome}
          </div>
          
          <div class="team-row ${sportingAway ? "sporting" : ""}">
            ${awayName}
            ${scoreAway}
          </div>

        </div>
      </div>
    `;
  });

  if (precisaBotao) {
    container.innerHTML += `
      <div style="text-align:center; margin-top:10px;">
        <button 
          onclick="toggleJogos('${containerId}')" 
          style="
            background:#0a5c2a;
            color:white;
            border:none;
            padding:6px 12px;
            border-radius:8px;
            font-size:12px;
            cursor:pointer;
          "
        >
          Ver Mais
        </button>
      </div>
    `;
  }

  // Guardar lista completa no elemento
  container.dataset.lista = JSON.stringify(lista);
  container.dataset.mostrarResultado = mostrarResultado;
}

  
  function toggleJogos(containerId) {

  const container = document.getElementById(containerId);
  const lista = JSON.parse(container.dataset.lista);
  const mostrarResultado = container.dataset.mostrarResultado === "true";

  const jaExpandido = container.dataset.expandido === "true";

  if (jaExpandido) {
    container.dataset.expandido = "false";
    render(lista, containerId, mostrarResultado);
  } else {
    container.dataset.expandido = "true";
    renderTodos(lista, containerId, mostrarResultado);
  }
}


  
function renderTodos(lista, containerId, mostrarResultado) {

  const container = document.getElementById(containerId);
  container.innerHTML = "";

  lista.forEach(j => {

    const homeName = normalizarNomeEquipa(j.homeTeam);
    const awayName = normalizarNomeEquipa(j.awayTeam);

    const sportingHome = homeName === "Sporting Clube de Portugal";
    const sportingAway = awayName === "Sporting Clube de Portugal";
    const derby = isDerby(homeName, awayName);

    const scoreHome = (mostrarResultado && j.score.home !== null)
      ? `<span class="score">${j.score.home}</span>`
      : "";

    const scoreAway = (mostrarResultado && j.score.away !== null)
      ? `<span class="score">${j.score.away}</span>`
      : "";

    container.innerHTML += `
      <div class="match">
        <div class="match-time">
          ${formatarData(j.date)}
        </div>
        <div class="match-main">

          <div>
            <span class="comp-badge ${getCompetitionClass(j.competition)}">
              ${j.competition}
            </span>
            ${derby ? `<span class="derby-label">CLÁSSICO</span>` : ""}
          </div>

          <div class="team-row ${sportingHome ? "sporting" : ""}">
            ${homeName}
            ${scoreHome}
          </div>

          <div class="team-row ${sportingAway ? "sporting" : ""}">
            ${awayName}
            ${scoreAway}
          </div>

        </div>
      </div>
    `;
  });

  container.innerHTML += `
    <div style="text-align:center; margin-top:10px;">
      <button 
        onclick="toggleJogos('${containerId}')"
        style="
          background:#888;
          color:white;
          border:none;
          padding:6px 12px;
          border-radius:8px;
          font-size:12px;
          cursor:pointer;
        "
      >
        Mostrar Menos
      </button>
    </div>
  `;
}
/* ================= RENDER CLASSIFICAÇÃO ================= */

function renderClassificacao(lista) {

  const container = document.getElementById("ligaContainer");

  if (!container) {
    console.log("ligaContainer não encontrado");
    return;
  }

  if (!lista || !lista.length) {
    container.innerHTML = "<div style='color:#777;'>Classificação indisponível.</div>";
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th style="text-align:left">Equipa</th>
          <th>J</th>
          <th>V</th>
          <th>E</th>
          <th>D</th>
          <th>DG</th>
          <th>Pts</th>
        </tr>
      </thead>
      <tbody>
  `;

  lista.forEach(t => {
    html += `
      <tr class="${t.team.includes("Sporting Clube de Portugal") ? "highlight" : ""}">
        <td>${t.position}</td>
        <td style="text-align:left">${t.team}</td>
        <td>${t.played}</td>
        <td>${t.won}</td>
        <td>${t.draw}</td>
        <td>${t.lost}</td>
        <td>${t.goalDifference}</td>
        <td><strong>${t.points}</strong></td>
      </tr>
    `;
  });

  html += `
      </tbody>
    </table>
  `;

  container.innerHTML = html;
}

/* =================  TUDO ================= */

async function carregarTudo() {

  /* ================= JOGOS ================= */

  try {
    var resJogos = await fetch("/api/sporting");
    var dataJogos = await resJogos.json();

    if (dataJogos && dataJogos.jogos) {

      var proximos = dataJogos.jogos.porJogar
        ? dataJogos.jogos.porJogar.slice()
        : [];

      var anteriores = dataJogos.jogos.jogados
        ? dataJogos.jogos.jogados.slice()
        : [];

      proximos.sort(function(a,b){
        return new Date(a.date) - new Date(b.date);
      });

      anteriores.sort(function(a,b){
        return new Date(b.date) - new Date(a.date);
      });

      render(proximos, "agendaContainer", false);
      render(anteriores, "resultadosContainer", true);
    }

    if (dataJogos && dataJogos.estatisticas) {
      var e = dataJogos.estatisticas;

      document.getElementById("estatisticasContainer").innerHTML = `
        <div><strong>Jogos:</strong> ${e.jogos}</div>
        <div><strong>Vitórias:</strong> ${e.vitorias}</div>
        <div><strong>Empates:</strong> ${e.empates}</div>
        <div><strong>Derrotas:</strong> ${e.derrotas}</div>
        <div><strong>Golos Marcados:</strong> ${e.golosMarcados}</div>
        <div><strong>Golos Sofridos:</strong> ${e.golosSofridos}</div>

        <div style="margin-top:15px;">
          <a 
            href="https://www.ligaportugal.pt/team/303/sporting-cp/ligaportugalbetclic/20252026?tab=stats" 
            target="_blank"
            style="
              display:inline-block;
              background:#0a5c2a;
              color:white;
              padding:8px 12px;
              border-radius:8px;
              text-decoration:none;
              font-size:12px;
              font-weight:600;
            "
          >
            Ver Estatísticas Oficiais
          </a>
        </div>
      `;
    }

  } catch (err) {
    console.error("Erro jogos:", err);
  }

  /* ================= CLASSIFICAÇÃO ================= */

  try {
    var resClass = await fetch("/api/classificacao");
    var dataClass = await resClass.json();

    if (dataClass && dataClass["Primeira Liga"]) {
      renderClassificacao(dataClass["Primeira Liga"]);
    }

  } catch (err) {
    console.error("Erro classificação:", err);
  }
}

if (window.innerWidth <= 900) {
  mostrarTab("jogos");
}
  
function mostrarTab(tab) {

  // Remover active de todos os botões
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  // Remover active de todos os conteúdos
  document.querySelectorAll(".tab-content").forEach(sec => {
    sec.classList.remove("active");
  });

  // Ativar botão correto
  const btnAtivo = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (btnAtivo) btnAtivo.classList.add("active");

  // Ativar conteúdo correto
  const secAtiva = document.querySelector(`.tab-content[data-tab="${tab}"]`);
  if (secAtiva) secAtiva.classList.add("active");
}
  
/* ================= INIT ================= */

carregarTudo();
setInterval(carregarTudo, 300000);

</script>

</body>
</html>
