<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jogos - Canal Sporting</title>

<style>
body {
  font-family: Arial;
  background: #f5f7f6;
  margin: 0;
  padding: 0;
}

h1 {
  text-align: center;
  color: #0a5c2a;
  margin: 20px 0;
}

.top-nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: white;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.top-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #0a5c2a;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.section {
  background: white;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 30px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.jogo-card {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.jogo-card:last-child {
  border-bottom: none;
}

.resultado {
  font-weight: bold;
  color: #0a5c2a;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  padding: 6px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.highlight {
  background: #e6f5ec;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>

<div class="top-nav">
  <a href="/">Feed</a>
  <a href="/jogos.html">Jogos</a>
  <a href="/mercado.html">Transferências</a>
</div>

<div class="container">

  <div class="section">
    <h2>Próximos Jogos</h2>
    <div id="porJogarContainer"></div>
  </div>

  <div class="section">
    <h2>Jogos Realizados</h2>
    <div id="jogadosContainer"></div>
  </div>

  <div class="section">
    <h2>Classificações</h2>
    <div id="classificacaoContainer"></div>
  </div>

</div>

<script>

/* JOGOS */
async function carregarJogos() {
  const res = await fetch("/api/jogos");
  const data = await res.json();

  const porJogarDiv = document.getElementById("porJogarContainer");
  const jogadosDiv = document.getElementById("jogadosContainer");

  porJogarDiv.innerHTML = "";
  jogadosDiv.innerHTML = "";

  Object.keys(data.porJogar).forEach(comp => {
    porJogarDiv.innerHTML += `<h3>${comp}</h3>`;
    data.porJogar[comp].forEach(jogo => {
      porJogarDiv.innerHTML += `
        <div class="jogo-card">
          ${jogo.homeTeam} vs ${jogo.awayTeam}
          <br>${jogo.dataFormatada}
        </div>
      `;
    });
  });

  Object.keys(data.jogados).forEach(comp => {
    jogadosDiv.innerHTML += `<h3>${comp}</h3>`;
    data.jogados[comp].forEach(jogo => {
      jogadosDiv.innerHTML += `
        <div class="jogo-card">
          ${jogo.homeTeam}
          <span class="resultado">
            ${jogo.score.home} - ${jogo.score.away}
          </span>
          ${jogo.awayTeam}
        </div>
      `;
    });
  });
}

/* CLASSIFICAÇÃO */
async function carregarClassificacao() {
  const res = await fetch("/api/classificacao");
  const data = await res.json();

  const container = document.getElementById("classificacaoContainer");
  container.innerHTML = "";

  Object.keys(data).forEach(comp => {

    container.innerHTML += `<h3>${comp}</h3>`;

    let table = `
      <table>
        <tr>
          <th>#</th>
          <th>Equipa</th>
          <th>J</th>
          <th>Pts</th>
        </tr>
    `;

    data[comp].forEach(team => {
      const highlight = team.team.includes("Sporting") ? "highlight" : "";
      table += `
        <tr class="${highlight}">
          <td>${team.position}</td>
          <td>${team.team}</td>
          <td>${team.played}</td>
          <td>${team.points}</td>
        </tr>
      `;
    });

    table += `</table>`;
    container.innerHTML += table;
  });
}

carregarJogos();
carregarClassificacao();

</script>

</body>
</html>
