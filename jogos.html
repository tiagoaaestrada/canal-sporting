/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
  font-size: 14px;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= LAYOUT ================= */

.layout {
  max-width: 1300px;
  margin: 40px auto;
  padding: 0 25px 60px 25px;
  display: grid;
  grid-template-columns: 420px 1fr 260px;
  gap: 35px;
}

.section {
  background: white;
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.section h2 {
  margin-top: 0;
  font-size: 18px;
}

/* ================= MATCH ================= */

.match {
  display: grid;
  grid-template-columns: 120px 1fr;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.match:last-child {
  border-bottom: none;
}

.match-time {
  font-size: 12px;
  color: #777;
}

.match-main {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.team-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.score {
  margin-left: auto;
  font-weight: bold;
}

.sporting {
  font-weight: bold;
  color: #0a5c2a;
  background: #e6f5ec;
  padding: 2px 6px;
  border-radius: 6px;
}

.match.today {
  border: 2px solid #0a5c2a;
  border-radius: 12px;
  padding: 8px;
  background: #f0fbf5;
}

.match {
  position: relative;
}

.match-live {
  border: 2px solid #cc0000;
  background: #fff5f5;
  border-radius: 12px;
}

.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  color: #cc0000;
  margin-top: 3px;
}

.live-badge::before {
  content: "";
  width: 7px;
  height: 7px;
  background: #cc0000;
  border-radius: 50%;
  animation: piscarLive 1s infinite;
}

  @keyframes piscarLive {
  0% { opacity: 1; }
  50% { opacity: 0.35; }
  100% { opacity: 1; }
}

.live-badge {
  animation: piscarLive 1s infinite;
}
  
.countdown {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 11px;
  font-weight: 600;
  background: #0a5c2a;
  color: white;
  padding: 4px 6px;
  border-radius: 6px;
}
  
/* ===== COMPETIÇÕES ===== */

.comp-badge {

  font-size: 11px;

.comp-liga {

/* ================= TABLE ================= */

th, td {

<script>

/* ================= DATA ================= */

function formatarData(d) {
  const date = new Date(d);
  const dia = String(date.getDate()).padStart(2,"0");
  const mes = String(date.getMonth()+1).padStart(2,"0");
  const ano = String(date.getFullYear()).slice(-2);
  const hora = String(date.getHours()).padStart(2,"0");
  const min = String(date.getMinutes()).padStart(2,"0");
  return `${dia}/${mes}/${ano}, ${hora}:${min}`;
}

/* ================= DERBY ================= */

function isDerby(home, away) {
  return (
    (home.includes("Sporting") &&
     (away.includes("Porto") || away.includes("Benfica"))) ||
    (away.includes("Sporting") &&
     (home.includes("Porto") || home.includes("Benfica")))
  );
}

/* ================= RENDER JOGOS ================= */

function getCompetitionClass(name) {

  const n = name.toLowerCase();

  if (n.includes("champions"))
    return "comp-champions";

  if (n.includes("taça de portugal") || n.includes("taca de portugal"))
    return "comp-taca";

  if (n.includes("taça da liga") || n.includes("taca da liga"))
    return "comp-liga-taca";

  if (n.includes("supertaça") || n.includes("supertaca"))
    return "comp-liga-taca";

  if (n.includes("amig"))
    return "comp-liga";

  return "comp-liga";
}

function normalizarNomeEquipa(nome) {

  if (!nome) return "";

  // Remove qualquer emoji ou símbolo gráfico
  nome = nome.replace(/[^\p{L}\p{N}\s\.\-]/gu, "").trim();

  const lower = nome.toLowerCase();

  if (
    lower === "sporting cp" ||
    lower === "sporting clube de portugal"
  ) {
    return "Sporting Clube de Portugal";
  }

  return nome;
}

function calcularEstadoJogo(dateStr) {

  const agora = new Date();
  const inicio = new Date(dateStr);
  const fimEstimado = new Date(inicio.getTime() + 2 * 60 * 60 * 1000);

  // LIVE
  if (agora >= inicio && agora <= fimEstimado) {
    return "live";
  }

  // FUTURO
  if (agora < inicio) {

    const diff = inicio - agora;
    const horas = Math.floor(diff / (1000 * 60 * 60));
    const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

    return {
      tipo: "countdown",
      texto: `${horas}h ${minutos}m`
    };
  }

  // TERMINADO
  return "finished";
}

  function calcularMinutoJogo(dateStr) {

  const inicio = new Date(dateStr);
  const agora = new Date();

  const diffMin = Math.floor((agora - inicio) / 60000);

  if (diffMin < 0) return "";

  if (diffMin <= 45) return `${diffMin}'`;

  if (diffMin <= 60) return "Intervalo";

  if (diffMin <= 105) return `${diffMin - 15}'`;

  return "FT";
}
  
function render(lista, containerId, mostrarResultado) {

  const container = document.getElementById(containerId);
  container.innerHTML = "";

  if (!lista.length) {
    container.innerHTML = "<div style='color:#777;'>Sem jogos.</div>";
    return;
  }

  const agora = new Date();

  /* ================= ORDENAR: LIVE PRIMEIRO ================= */

const listaOrdenada = [...lista].sort((a, b) => {

  const estadoA = calcularEstadoJogo(a.date);
  const estadoB = calcularEstadoJogo(b.date);

  // LIVE sempre no topo
  if (estadoA === "live") return -1;
  if (estadoB === "live") return 1;

  // 🔥 Se for resultados (mostrarResultado = true)
  if (mostrarResultado) {
    return new Date(b.date) - new Date(a.date); // mais recente primeiro
  }

  // 🔥 Se for agenda
  return new Date(a.date) - new Date(b.date); // mais próximo primeiro
});

  const maxVisiveis = 3;
  const precisaBotao = listaOrdenada.length > maxVisiveis;

  const jogosParaMostrar = precisaBotao
    ? listaOrdenada.slice(0, maxVisiveis)
    : listaOrdenada;

  jogosParaMostrar.forEach(j => {

    const hojeISO = new Date().toISOString().split("T")[0];
    const isToday = j.date && j.date.startsWith(hojeISO);
    
    const estado = isToday ? calcularEstadoJogo(j.date) : null;

    const homeName = normalizarNomeEquipa(j.homeTeam);
    const awayName = normalizarNomeEquipa(j.awayTeam);

    const sportingHome = homeName === "Sporting Clube de Portugal";
    const sportingAway = awayName === "Sporting Clube de Portugal";
    const derby = isDerby(homeName, awayName);

    const scoreHome = (mostrarResultado && j.score.home !== null)
      ? `<span class="score">${j.score.home}</span>`
      : "";

    const scoreAway = (mostrarResultado && j.score.away !== null)
      ? `<span class="score">${j.score.away}</span>`
      : "";

    container.innerHTML += `
      <div class="match 
        ${isToday ? "today" : ""} 
        ${estado === "live" ? "match-live" : ""}">
        
        ${
            : isToday && estado && estado.tipo === "countdown"
              ? `<span class="countdown">${estado.texto}</span>`
              : ""
        }
        
        <div class="match-time">
          ${formatarData(j.date)}
        
          ${
            isToday && estado === "live"
              ? `<div class="live-badge">AO VIVO ${calcularMinutoJogo(j.date)}</div>`
              : ""
          }
        
          ${
            isToday && estado && estado.tipo === "countdown"
              ? `<div class="countdown">${estado.texto}</div>`
              : ""
          }
        
        </div>

        <div class="match-main">

          <div>
            <span class="comp-badge ${getCompetitionClass(j.competition)}">
              ${j.competition}
            </span>
            ${derby ? `<span class="derby-label">CLÁSSICO</span>` : ""}
          </div>

          <div class="team-row ${sportingHome ? "sporting" : ""}">
            ${homeName}
            ${scoreHome}
          </div>
          
          <div class="team-row ${sportingAway ? "sporting" : ""}">
            ${awayName}
            ${scoreAway}
          </div>

        </div>
      </div>
    `;
  });

  if (precisaBotao) {
    container.innerHTML += `
      <div style="text-align:center; margin-top:10px;">
        <button 
          onclick="toggleJogos('${containerId}')" 
          style="
            background:#0a5c2a;
            color:white;
            border:none;
            padding:6px 12px;
            border-radius:8px;
            font-size:12px;
            cursor:pointer;
          "
        >
          Ver Mais
        </button>
      </div>
    `;
  }

  container.dataset.lista = JSON.stringify(listaOrdenada);
  container.dataset.mostrarResultado = mostrarResultado;
}

  
  function toggleJogos(containerId) {

  const container = document.getElementById(containerId);
  const lista = JSON.parse(container.dataset.lista);
  const mostrarResultado = container.dataset.mostrarResultado === "true";

  const jaExpandido = container.dataset.expandido === "true";

  if (jaExpandido) {
    container.dataset.expandido = "false";
    render(lista, containerId, mostrarResultado);
  } else {
    container.dataset.expandido = "true";
    renderTodos(lista, containerId, mostrarResultado);
  }
}


  
function renderTodos(lista, containerId, mostrarResultado) {

  const container = document.getElementById(containerId);
  container.innerHTML = "";

  // Botão minimizar no topo direito
  container.innerHTML += `
    <div style="text-align:right; margin-bottom:8px;">
      <button 
        onclick="toggleJogos('${containerId}')"

        "

  `;

  lista.forEach(j => {

    const hojeISO = new Date().toISOString().split("T")[0];
    const isToday = j.date && j.date.startsWith(hojeISO);
    const estado = isToday ? calcularEstadoJogo(j.date) : null;
    
    const homeName = normalizarNomeEquipa(j.homeTeam);
    const awayName = normalizarNomeEquipa(j.awayTeam);

    const sportingHome = homeName === "Sporting Clube de Portugal";
    const sportingAway = awayName === "Sporting Clube de Portugal";
    const derby = isDerby(homeName, awayName);

    const scoreHome = (mostrarResultado && j.score.home !== null)
      ? `<span class="score">${j.score.home}</span>`
      : "";

    const scoreAway = (mostrarResultado && j.score.away !== null)
      ? `<span class="score">${j.score.away}</span>`
      : "";

    container.innerHTML += `
      <div class="match 
          ${isToday ? "today" : ""} 
          ${estado === "live" ? "match-live" : ""}">
          
          ${
            isToday && estado === "live"
              ? `<span class="live-badge">AO VIVO ${calcularMinutoJogo(j.date)}</span>`
              : isToday && estado && estado.tipo === "countdown"
                ? `<span class="countdown">${estado.texto}</span>`
                : ""
          }
        <div class="match-time">
          ${formatarData(j.date)}
        </div>
        <div class="match-main">

          <div>
            <span class="comp-badge ${getCompetitionClass(j.competition)}">
              ${j.competition}
            </span>
            ${derby ? `<span class="derby-label">CLÁSSICO</span>` : ""}
          </div>

          <div class="team-row ${sportingHome ? "sporting" : ""}">
            ${homeName}
            ${scoreHome}
          </div>

          <div class="team-row ${sportingAway ? "sporting" : ""}">
            ${awayName}
            ${scoreAway}
          </div>

        </div>
      </div>
    `;
  });

  // 🔥 Botão Ver Menos no fim
  container.innerHTML += `
    <div style="text-align:center; margin-top:12px;">
      <button 
        onclick="toggleJogos('${containerId}')"
        style="
          background:#0a5c2a;
          color:white;
          border:none;
          padding:6px 12px;
          border-radius:8px;
          font-size:12px;
          cursor:pointer;
        "
      >
        Ver Menos
      </button>
    </div>
  `;
}
/* ================= RENDER CLASSIFICAÇÃO ================= */

}

  /* ================= CALCULAR ESTATÍSTICAS POR COMPETIÇÃO ================= */

function calcularEstatisticasPorCompeticao(listaJogos) {

  const stats = {};

  listaJogos.forEach(j => {
    
    if (!j.score || j.score.home === null || j.score.away === null) return;
    
    const comp = j.competition || "Outros";

    if (!stats[comp]) {
      stats[comp] = {
        jogos: 0,

        vitorias: 0,
        empates: 0,
        derrotas: 0,

        vitoriasCasa: 0,
        vitoriasFora: 0,
        empatesCasa: 0,
        empatesFora: 0,
        derrotasCasa: 0,
        derrotasFora: 0,

        golosMarcados: 0,
        golosSofridos: 0,
        golosMarcadosCasa: 0,
        golosMarcadosFora: 0,
        golosSofridosCasa: 0,
        golosSofridosFora: 0
      };
    }

    const homeNormal = normalizarNomeEquipa(j.homeTeam);
    const sportingHome = homeNormal === "Sporting Clube de Portugal";
    
    const gm = sportingHome ? j.score.home : j.score.away;
    const gs = sportingHome ? j.score.away : j.score.home;

    stats[comp].jogos++;

    stats[comp].golosMarcados += gm;
    stats[comp].golosSofridos += gs;

    if (sportingHome) {
      stats[comp].golosMarcadosCasa += gm;
      stats[comp].golosSofridosCasa += gs;
    } else {
      stats[comp].golosMarcadosFora += gm;
      stats[comp].golosSofridosFora += gs;
    }

    if (gm > gs) {
      stats[comp].vitorias++;
      sportingHome ? stats[comp].vitoriasCasa++ : stats[comp].vitoriasFora++;
    }
    else if (gm === gs) {
      stats[comp].empates++;
      sportingHome ? stats[comp].empatesCasa++ : stats[comp].empatesFora++;
    }
    else {
      stats[comp].derrotas++;
      sportingHome ? stats[comp].derrotasCasa++ : stats[comp].derrotasFora++;
    }

  });

  return stats;
}
  
/* =================  TUDO ================= */

async function carregarTudo() {

  try {
    const resJogos = await fetch("/api/sporting");
    const dataJogos = await resJogos.json();

    if (dataJogos && dataJogos.jogos) {

      const todosJogos = [
        ...(dataJogos.jogos.porJogar || []),
        ...(dataJogos.jogos.jogados || []),
        ...jogosExtra
      ];

      const jogosLive = [];
      const jogosFuturos = [];
      const jogosTerminados = [];

      todosJogos.forEach(j => {
        const estado = calcularEstadoJogo(j.date);

        if (estado === "live") {
          jogosLive.push(j);
        } 
        else if (estado === "finished") {
          jogosTerminados.push(j);
        } 
        else {
          jogosFuturos.push(j);
        }
      });

      // Ordenar
      jogosFuturos.sort((a, b) => new Date(a.date) - new Date(b.date));
      jogosTerminados.sort((a, b) => new Date(a.date) - new Date(b.date));

      // Mostrar LIVE acima da Agenda
      if (jogosLive.length) {
        document.getElementById("jogoDoDiaSection").style.display = "block";
        render(jogosLive, "jogoDoDiaContainer", false);
      } else {
        document.getElementById("jogoDoDiaSection").style.display = "none";
      }

      render(jogosFuturos, "agendaContainer", false);
      render(jogosTerminados, "resultadosContainer", true);

      verificarDiaDeJogo(jogosFuturos);

      const estatisticasPorComp =
        calcularEstatisticasPorCompeticao(jogosTerminados);

      renderEstatisticasSeparadas(estatisticasPorComp);
    }

  } catch (err) {
    console.error("Erro jogos:", err);
  }

  try {
    const resClass = await fetch("/api/classificacao");
    const dataClass = await resClass.json();

    if (dataClass && dataClass["Primeira Liga"]) {
      renderClassificacao(dataClass["Primeira Liga"]);
    }

  } catch (err) {
    console.error("Erro classificação:", err);
  }
}

  if (window.innerWidth <= 900) {
  mostrarTab("jogos");
}
  
function mostrarTab(tab) {

  // Remover active de todos os botões
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  // Remover active de todos os conteúdos
  document.querySelectorAll(".tab-content").forEach(sec => {
    sec.classList.remove("active");
  });

  // Ativar botão correto
  const btnAtivo = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (btnAtivo) btnAtivo.classList.add("active");

  // Ativar conteúdo correto
  const secAtiva = document.querySelector(`.tab-content[data-tab="${tab}"]`);
  if (secAtiva) secAtiva.classList.add("active");
}
  
/* ================= INIT ================= */

carregarTudo();
setInterval(carregarTudo, 60000);

          D ${e.derrotasFora}
        </div>

        <div style="margin-top:6px;">

          cursor:pointer;

      >
        Ver Mais
      </button>

    <div style="text-align:center; margin-top:15px;">
      <a 
        href="https://maisfutebol.iol.pt/sporting/estatisticas/1576"
        target="_blank"
        style="
          display:inline-block;
          background:#eee;
          color:#333;
          padding:8px 14px;
          border-radius:8px;
          text-decoration:none;
          font-size:12px;
          font-weight:600;
        "
      >
        Ver Estatísticas Oficiais
      </a>
    </div>
  `;

  container.innerHTML = html;

  ativarToggleEstatisticas();
}

function ativarToggleEstatisticas() {

  const btn = document.getElementById("toggleStatsBtn");
  const hidden = document.querySelectorAll(".hidden-stat");

  let expandido = false;

  btn.addEventListener("click", function() {

    expandido = !expandido;

    hidden.forEach(el => {
      el.style.display = expandido ? "block" : "none";
    });

    btn.textContent = expandido ? "Ver Menos" : "Ver Mais";
  });
}

function verificarDiaDeJogo(listaProximos) {

  if (!listaProximos || !listaProximos.length) return;

  const agora = new Date();
  const hojeISO = agora.toISOString().split("T")[0];

  const jogoHoje = listaProximos.find(j =>
    j.date && j.date.startsWith(hojeISO)
  );

  if (!jogoHoje) return;

  const horaJogo = new Date(jogoHoje.date);
  const diffMs = horaJogo - agora;
  const diffHoras = diffMs / (1000 * 60 * 60);

  const jaMostradoHoje = localStorage.getItem("popupPrimeiraAbertura") === hojeISO;
  const jaMostrado12h = localStorage.getItem("popupMeioDia") === hojeISO;
  const jaMostrado1h = localStorage.getItem("popup1Hora") === hojeISO;

  let mostrar = false;

  /* ================= 1️⃣ PRIMEIRA ABERTURA DO DIA ================= */

  if (!jaMostradoHoje) {
    localStorage.setItem("popupPrimeiraAbertura", hojeISO);
    mostrar = true;
  }

  /* ================= 2️⃣ MEIO-DIA ================= */

  if (!mostrar && agora.getHours() === 12 && !jaMostrado12h) {
    localStorage.setItem("popupMeioDia", hojeISO);
    mostrar = true;
  }

  /* ================= 3️⃣ 1 HORA ANTES ================= */

  if (!mostrar && diffHoras <= 1 && diffHoras > 0 && !jaMostrado1h) {
    localStorage.setItem("popup1Hora", hojeISO);
    mostrar = true;
  }

  if (!mostrar) return;

  /* ================= CONTEÚDO POPUP ================= */

  const homeNormal = normalizarNomeEquipa(jogoHoje.homeTeam);
  const awayNormal = normalizarNomeEquipa(jogoHoje.awayTeam);

  const sportingCasa = homeNormal === "Sporting Clube de Portugal";
  const adversario = sportingCasa ? awayNormal : homeNormal;
  const local = sportingCasa ? "🏠 Em Casa" : "✈️ Fora";

  const hora = horaJogo.toLocaleTimeString("pt-PT", {
    hour: "2-digit",
    minute: "2-digit"
  });

  document.getElementById("popupContent").innerHTML = `
    <strong>${jogoHoje.competition}</strong><br><br>
    Sporting Clube de Portugal vs ${adversario}<br>
    ${local}<br>
    🕒 ${hora}
  `;

  document.getElementById("matchPopup").style.display = "flex";
}

function fecharPopup() {
  document.getElementById("matchPopup").style.display = "none";
}
  
</script>

<div id="matchPopup" class="popup-overlay" style="display:none;">

    <h3>🔔 Dia de Jogo!</h3>

    <button onclick="fecharPopup()">Fechar</button>
  </div>
</div>
