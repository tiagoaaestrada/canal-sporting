<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Canal Sporting</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a5c2a">

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
  font-size: 14px;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= LAYOUT ================= */

.layout {
  max-width: 1300px;
  margin: 40px auto;
  padding: 0 25px 60px 25px;
  display: grid;
  grid-template-columns: 420px 1fr 260px;
  gap: 35px;
}

.section {
  background: white;
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.section h2 {
  margin-top: 0;
  font-size: 18px;
}

/* ================= CAPAS DESKTOP ================= */

.covers-column {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.cover-box {
  background: white;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 5px 14px rgba(0,0,0,0.06);
  text-align: center;
}

.cover-box h3 {
  margin: 0 0 10px 0;
  font-size: 15px;
}

.cover-box img {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

/* ================= FEED ================= */

.feed {
  background: white;
  padding: 22px 26px;
  border-radius: 16px;
  box-shadow: 0 5px 16px rgba(0,0,0,0.07);
}

.feed-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 12px;
}

.feed-header h2 {
  margin: 0;
  font-size: 18px;
}

#refreshBtn {
  background: #0a5c2a;
  color: white;
  border: none;
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}

.feed-item {
  padding: 12px 0;
  border-bottom: 1px solid #eee;
}

.feed-item:last-child {
  border-bottom: none;
}

.source {
  font-size: 11px;
  font-weight: bold;
  color: #0a5c2a;
  margin-bottom: 5px;
}

.feed-item a {
  text-decoration: none;
  color: #222;
  font-weight: 600;
  line-height: 1.4;
}

.feed-item a:hover {
  color: #0a5c2a;
}

/* ================= MOBILE ================= */

@media (max-width: 1000px) {

  body {
    background: #000;
  }

  .layout {
    grid-template-columns: 1fr;
    margin: 0;
    padding: 0;
    gap: 10px; /* MAIS COMPACTO */
  }

  .main-header {
    padding: 14px 0 6px 0;
  }

  .header-title a {
    font-size: 20px;
  }

  .header-nav {
    gap: 16px;
    font-size: 12px;
  }

  /* ===== COVERS ===== */

  .covers-column {
    flex-direction: row;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 0;
  }

  .covers-column::-webkit-scrollbar {
    display: none;
  }

  .cover-box {
    min-width: 100vw;
    height: auto;
    background: #000;
    padding: 15px 10px 5px 10px; /* menos espaço inferior */
    border-radius: 0;
    box-shadow: none;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cover-box h3 {
    color: white;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .cover-box img {
    max-width: 88%;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 6px;
  }

  /* ===== FEED ===== */

  .feed {
    background: white;
    margin: 5px 12px 25px 12px; /* muito mais próximo das capas */
    padding: 18px;
    border-radius: 14px;
  }

}
</script>

</body>
</html>
