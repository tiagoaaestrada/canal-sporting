<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Canal Sporting</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a5c2a">

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
  font-size: 14px;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 16px 0 6px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 22px;
  margin-top: 8px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
  font-size: 13px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= LAYOUT ================= */

.layout {
  max-width: 1300px;
  margin: 30px auto;
  padding: 0 20px 40px 20px;
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 35px;
}

/* ================= CAPAS DESKTOP ================= */

.covers-column {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.cover-box {
  background: white;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 5px 14px rgba(0,0,0,0.06);
  text-align: center;
}

.cover-box h3 {
  margin: 0 0 10px 0;
  font-size: 15px;
}

.cover-box img {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

/* ================= FEED ================= */

.feed {
  background: white;
  padding: 22px 26px;
  border-radius: 16px;
  box-shadow: 0 5px 16px rgba(0,0,0,0.07);
}

.feed-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 12px;
}

.feed-header h2 {
  margin: 0;
  font-size: 18px;
}

#refreshBtn {
  background: #0a5c2a;
  color: white;
  border: none;
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}

.feed-item {
  padding: 12px 0;
  border-bottom: 1px solid #eee;
}

.feed-item:last-child {
  border-bottom: none;
}

.source {
  font-size: 11px;
  font-weight: bold;
  color: #0a5c2a;
  margin-bottom: 5px;
}

.feed-item a {
  text-decoration: none;
  color: #222;
  font-weight: 600;
  line-height: 1.4;
}

.feed-item a:hover {
  color: #0a5c2a;
}

/* ================= MOBILE ================= */

@media (max-width: 1000px) {

  body {
    background: #f5f7f6;
  }

  .layout {
    grid-template-columns: 1fr;
    margin: 0;
    padding: 0;
    gap: 10px; /* MAIS COMPACTO */
  }

  .main-header {
    padding: 14px 0 6px 0;
  }

  .header-title a {
    font-size: 20px;
  }

  .header-nav {
    gap: 16px;
    font-size: 12px;
  }

  /* ===== COVERS ===== */

  .covers-column {
    flex-direction: row;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 0;
  }

  .covers-column::-webkit-scrollbar {
    display: none;
  }

  .cover-box {
    min-width: 100vw;
    height: auto;
    background: #f5f7f6;
    padding: 15px 10px 5px 10px; /* menos espaço inferior */
    border-radius: 0;
    box-shadow: none;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cover-box h3 {
    color: white;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .cover-box img {
    max-width: 88%;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 6px;
  }

  /* ===== FEED ===== */

  .feed {
    background: white;
    margin: 5px 12px 25px 12px; /* muito mais próximo das capas */
    padding: 18px;
    border-radius: 14px;
  }

}
/* ===== FEED EXPANSION ===== */

.feed-controls {
  text-align: center;
  margin-top: 10px;
}

#toggleFeedBtn {
  background: none;
  border: none;
  color: #0a5c2a;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
}

#toggleFeedBtn span {
  margin-left: 5px;
}

.hidden-news {
  display: none;
}

.feed-collapsed .hidden-news {
  display: none;
}

.feed-expanded .hidden-news {
  display: block;
}
</style>
  
</head>

<body>

<header class="main-header">

  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>

  <nav class="header-nav">
    <a href="/" id="nav-feed">Feed</a>
    <a href="/jogos.html" id="nav-jogos">Jogos</a>
    <a href="/mercado.html" id="nav-mercado">Transferências</a>
  </nav>

</header>

<div class="layout">

  <!-- CAPAS ESQUERDA -->
  <div class="covers-column">

    <!-- 1º Record -->
    <div class="cover-box">
      <h3>Record</h3>
      <img id="record-cover" src="/record.png">
    </div>

    <!-- 2º A Bola -->
    <div class="cover-box">
      <h3>A Bola</h3>
      <img id="bola-cover" src="/abola.png">
    </div>

    <!-- 3º O Jogo -->
    <div class="cover-box">
      <h3>O Jogo</h3>
      <img id="ojogo-cover" src="/ojogo.png">
    </div>

  </div>

  <!-- FEED DIREITA -->
  <div class="feed">

    <div class="feed-header">
      <h2>Feed Geral Sporting</h2>
      <button id="refreshBtn">Atualizar</button>
    </div>

    <div id="feed-container">A carregar...</div>
    
    <div class="feed-controls">
      <button id="toggleFeedBtn">
        Ver mais <span id="feedArrow">▼</span>
      </button>
    </div>
  </div>

</div>

<script>

/* FEED */
async function loadFeed() {
  const res = await fetch("/api/feed");
  const data = await res.json();
  const container = document.getElementById("feed-container");
  container.innerHTML = "";

  const today = new Date().toISOString().split("T")[0];

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "feed-item";

    const itemDate = item.date?.split("T")[0];

    if (itemDate !== today) {
      div.classList.add("hidden-news");
    }

    div.innerHTML = `
      <div class="source">
        ${item.source} • ${item.formattedDate}
      </div>
      <a href="${item.link}" target="_blank">${item.title}</a>
    `;

    container.appendChild(div);
  });

  container.classList.add("feed-collapsed");
}

document.getElementById("refreshBtn").addEventListener("click", loadFeed);

/* CAPAS */
async function loadCover(endpoint, imgId) {
  const res = await fetch(endpoint);
  const data = await res.json();
  const img = document.getElementById(imgId);
  img.src = data.cover;
  img.onclick = () => window.open(data.coverLink, "_blank");
}

loadCover("/api/record","record-cover");
loadCover("/api/bola","bola-cover");
loadCover("/api/ojogo","ojogo-cover");

loadFeed();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

/* NAV ACTIVE */

const path = window.location.pathname;

if (path === "/" || path === "/index.html") {
  document.getElementById("nav-feed")?.classList.add("active");
}

if (path.includes("jogos")) {
  document.getElementById("nav-jogos")?.classList.add("active");
}

if (path.includes("mercado")) {
  document.getElementById("nav-mercado")?.classList.add("active");
}
const toggleBtn = document.getElementById("toggleFeedBtn");
const feedContainer = document.getElementById("feed-container");
const arrow = document.getElementById("feedArrow");

toggleBtn.addEventListener("click", () => {
  if (feedContainer.classList.contains("feed-collapsed")) {
    feedContainer.classList.remove("feed-collapsed");
    feedContainer.classList.add("feed-expanded");
    toggleBtn.innerHTML = 'Ver menos <span id="feedArrow">▲</span>';
  } else {
    feedContainer.classList.remove("feed-expanded");
    feedContainer.classList.add("feed-collapsed");
    toggleBtn.innerHTML = 'Ver mais <span id="feedArrow">▼</span>';
  }
});
</script>

</body>
</html>
