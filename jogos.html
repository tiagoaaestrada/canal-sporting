<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jogos - Canal Sporting</title>

<style>
body {
  font-family: Arial;
  background: #f5f7f6;
  margin: 0;
}

h1 {
  text-align: center;
  color: #0a5c2a;
  margin: 20px 0;
}

.top-nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: white;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.top-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #0a5c2a;
}

.layout {
  display: flex;
  gap: 30px;
  max-width: 1300px;
  margin: auto;
  padding: 20px;
}

.left {
  flex: 1;
}

.right {
  flex: 1.3;
}

.section {
  background: white;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 25px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.jogo-item {
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.resultado {
  font-weight: bold;
  color: #0a5c2a;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 6px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.highlight {
  background: #e6f5ec;
  font-weight: bold;
}

@media (max-width: 900px) {
  .layout {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>

<div class="top-nav">
  <a href="/">Feed</a>
  <a href="/jogos.html">Jogos</a>
  <a href="/mercado.html">Transferências</a>
</div>

<div class="layout">

  <!-- ESQUERDA -->
  <div class="left">

    <div class="section">
      <h2>Classificações</h2>
      <div id="classificacaoContainer"></div>
    </div>

    <div class="section">
      <h2>Taças (Percurso)</h2>
      <div id="tacasContainer"></div>
    </div>

  </div>

  <!-- DIREITA -->
  <div class="right">

    <div class="section">
      <h2>Próximos Jogos</h2>
      <div id="porJogarContainer"></div>
    </div>

    <div class="section">
      <h2>Jogos Realizados</h2>
      <div id="jogadosContainer"></div>
    </div>

  </div>

</div>

<script>

function formatarData(dateString) {
  const d = new Date(dateString);
  return d.toLocaleString("pt-PT");
}

/* JOGOS */
async function carregarJogos() {
  const res = await fetch("/api/jogos");
  const data = await res.json();

  const proximos = Object.values(data.porJogar).flat()
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  const jogados = Object.values(data.jogados).flat()
    .sort((a,b) => new Date(b.date) - new Date(a.date));

  document.getElementById("porJogarContainer").innerHTML =
    proximos.map(j =>
      `<div class="jogo-item">
        ${j.homeTeam} vs ${j.awayTeam}
        - ${j.competition}
        - ${formatarData(j.date)}
      </div>`
    ).join("");

  document.getElementById("jogadosContainer").innerHTML =
    jogados.map(j =>
      `<div class="jogo-item">
        ${j.homeTeam}
        <span class="resultado">${j.score.home} - ${j.score.away}</span>
        ${j.awayTeam}
        - ${j.competition}
        - ${formatarData(j.date)}
      </div>`
    ).join("");
}

/* CLASSIFICAÇÃO */
async function carregarClassificacao() {
  const res = await fetch("/api/classificacao");
  const data = await res.json();

  let html = "";

  Object.keys(data).forEach(comp => {

    html += `<h3>${comp}</h3>
    <table>
      <tr>
        <th>#</th><th>Equipa</th><th>J</th><th>V</th>
        <th>E</th><th>D</th><th>DG</th><th>Pts</th>
      </tr>`;

    data[comp].forEach(t => {
      const highlight = t.team === "Sporting Clube de Portugal" ? "highlight" : "";
      html += `
        <tr class="${highlight}">
          <td>${t.position}</td>
          <td>${t.team}</td>
          <td>${t.played}</td>
          <td>${t.won}</td>
          <td>${t.draw}</td>
          <td>${t.lost}</td>
          <td>${t.goalDifference}</td>
          <td>${t.points}</td>
        </tr>`;
    });

    html += `</table>`;
  });

  document.getElementById("classificacaoContainer").innerHTML = html;
}

/* TAÇAS */
async function carregarTacas() {
  const res = await fetch("/api/tacas");
  const data = await res.json();

  let html = "";

  Object.keys(data).forEach(comp => {
    html += `<h3>${comp}</h3>`;
    data[comp].forEach(j => {
      html += `
        <div class="jogo-item">
          ${j.home} ${j.score.home ?? "-"} - ${j.score.away ?? "-"} ${j.away}
          - ${formatarData(j.date)}
        </div>`;
    });
  });

  document.getElementById("tacasContainer").innerHTML = html;
}

carregarJogos();
carregarClassificacao();
carregarTacas();

setInterval(() => {
  carregarJogos();
  carregarClassificacao();
  carregarTacas();
}, 300000);

</script>

</body>
</html>
