<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Canal Sporting</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a5c2a">

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
  font-size: 14px;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  position: relative;
  z-index: 10;
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= LAYOUT ================= */

.layout {
  max-width: 1300px;
  margin: 40px auto;
  padding: 0 25px 50px 25px;
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 40px;
}

/* ================= CAPAS DESKTOP ================= */

.covers-column {
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.cover-box {
  background: white;
  padding: 18px;
  border-radius: 16px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
  text-align: center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.cover-box:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 22px rgba(0,0,0,0.12);
}

.cover-box h3 {
  margin: 0 0 12px 0;
  font-size: 16px;
}

.cover-box img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

/* ================= FEED ================= */

.feed {
  background: white;
  padding: 25px 30px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.feed-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 15px;
}

.feed-header h2 {
  margin: 0;
  font-size: 20px;
}

#refreshBtn {
  background: #0a5c2a;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: background 0.2s ease;
}

#refreshBtn:hover {
  background: #08491f;
}

.feed-item {
  padding: 14px 0;
  border-bottom: 1px solid #eee;
}

.feed-item:last-child {
  border-bottom: none;
}

.source {
  font-size: 12px;
  font-weight: bold;
  color: #0a5c2a;
  margin-bottom: 6px;
}

.feed-item a {
  text-decoration: none;
  color: #222;
  font-weight: 600;
  line-height: 1.4;
  transition: color 0.2s ease;
}

.feed-item a:hover {
  color: #0a5c2a;
}

/* ================= MOBILE EXPERIENCE ================= */

@media (max-width: 1000px) {

  /* Layout simples */

  .layout {
    grid-template-columns: 1fr;
    margin: 0;
    padding: 0;
    gap: 0;
  }

  /* Header mais compacto */

  .main-header {
    padding: 14px 0 6px 0;
  }

  .header-title a {
    font-size: 20px;
  }

  .header-nav {
    gap: 18px;
    margin-top: 8px;
    font-size: 13px;
  }

  /* Fundo escuro estilo quiosque */

  body {
    background: #f5f7f6;
  }

  /* COVERS estilo cinema */

  .covers-column {
    flex-direction: row;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 0;
  }

  .covers-column::-webkit-scrollbar {
    display: none;
  }

  .cover-box {
    min-width: 100vw;
    height: 100dvh;
    background: #f5f7f6;
    padding: 0;
    border-radius: 0;
    box-shadow: none;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: start;
  }

  .cover-box h3 {
    display: none; /* remove título no modo full */
  }

  .cover-box img {
    max-width: 90%;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 6px;
  }

  /* Feed volta ao normal abaixo */

  .feed {
    background: #fff;
    margin: 20px 15px 40px 15px;
    padding: 20px;
    border-radius: 16px;
  }

}

</style>
  
</head>

<body>

<header class="main-header">

  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>

  <nav class="header-nav">
    <a href="/" id="nav-feed">Feed</a>
    <a href="/jogos.html" id="nav-jogos">Jogos</a>
    <a href="/mercado.html" id="nav-mercado">Transferências</a>
  </nav>

</header>

<div class="layout">

  <!-- CAPAS ESQUERDA -->
  <div class="covers-column">

    <!-- 1º Record -->
    <div class="cover-box">
      <h3>Record</h3>
      <img id="record-cover" src="/record.png">
    </div>

    <!-- 2º A Bola -->
    <div class="cover-box">
      <h3>A Bola</h3>
      <img id="bola-cover" src="/abola.png">
    </div>

    <!-- 3º O Jogo -->
    <div class="cover-box">
      <h3>O Jogo</h3>
      <img id="ojogo-cover" src="/ojogo.png">
    </div>

  </div>

  <!-- FEED DIREITA -->
  <div class="feed">

    <div class="feed-header">
      <h2>Feed Geral Sporting</h2>
      <button id="refreshBtn">Atualizar</button>
    </div>

    <div id="feed-container">A carregar...</div>

  </div>

</div>

<script>

/* FEED */
async function loadFeed() {
  const res = await fetch("/api/feed");
  const data = await res.json();
  const container = document.getElementById("feed-container");
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "feed-item";
    div.innerHTML = `
      <div class="source">
        ${item.source} • ${item.formattedDate}
      </div>
      <a href="${item.link}" target="_blank">${item.title}</a>
    `;
    container.appendChild(div);
  });
}

document.getElementById("refreshBtn").addEventListener("click", loadFeed);

/* CAPAS */
async function loadCover(endpoint, imgId) {
  const res = await fetch(endpoint);
  const data = await res.json();
  const img = document.getElementById(imgId);
  img.src = data.cover;
  img.onclick = () => window.open(data.coverLink, "_blank");
}

loadCover("/api/record","record-cover");
loadCover("/api/bola","bola-cover");
loadCover("/api/ojogo","ojogo-cover");

loadFeed();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

/* NAV ACTIVE */

const path = window.location.pathname;

if (path === "/" || path === "/index.html") {
  document.getElementById("nav-feed")?.classList.add("active");
}

if (path.includes("jogos")) {
  document.getElementById("nav-jogos")?.classList.add("active");
}

if (path.includes("mercado")) {
  document.getElementById("nav-mercado")?.classList.add("active");
}

</script>

</body>
</html>
