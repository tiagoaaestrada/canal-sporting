<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<title>Canal Sporting</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 0;
  text-align: center;
}

h1 {
  color: #0a5c2a;
  margin: 40px 0 5px 0;
}

.section-title {
  color: #0a5c2a;
  margin: 40px 0 20px 0;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  flex-wrap: wrap;
  align-items: stretch;
}

.column {
  background: #ffffff;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  width: 360px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.column:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.12);
}

.column h3 {
  color: #0a5c2a;
  margin-bottom: 15px;
}

.cover {
  width: 100%;
  height: auto;
  max-height: 520px;
  object-fit: contain;
  margin-bottom: 20px;
  border-radius: 8px;
  cursor: pointer;
}

.news {
  text-align: left;
}

.news a {
  display: block;
  margin-bottom: 10px;
  color: #0a5c2a;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
  line-height: 1.4;
}

.news a:hover {
  text-decoration: underline;
}

/* ====== X CARDS ====== */

.x-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
}

.x-logo {
  width: 40px;
  margin-bottom: 15px;
}

.x-username {
  font-size: 18px;
  font-weight: bold;
  color: #0a5c2a;
  margin-bottom: 8px;
}

.x-description {
  font-size: 14px;
  color: #555;
  margin-bottom: 20px;
  padding: 0 10px;
}

.x-button {
  background: #0a5c2a;
  color: white;
  padding: 10px 18px;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  transition: background 0.2s ease;
}

.x-button:hover {
  background: #084a21;
}

@media (max-width: 1100px) {
  .container {
    flex-direction: column;
    align-items: center;
  }

  .column {
    width: 90%;
    max-width: 420px;
  }
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>

<h2 class="section-title">Jornais</h2>

<div class="container">

  <div class="column">
    <h3>Record</h3>
    <img id="record-cover" class="cover" src="/record.png" />
    <div id="record-news" class="news"></div>
  </div>

  <div class="column">
    <h3>A Bola</h3>
    <img id="bola-cover" class="cover" src="/abola.png" />
    <div id="bola-news" class="news"></div>
  </div>

  <div class="column">
    <h3>O Jogo</h3>
    <img id="ojogo-cover" class="cover" src="/ojogo.png" />
    <div id="ojogo-news" class="news"></div>
  </div>

</div>

<h2 class="section-title">Canais X</h2>

<div class="container">

  <!-- Sporting Adeptos -->
  <div class="column x-card">
    <img src="/x.png" class="x-logo" alt="X">
    <div class="x-username">@Sporting_CPAdep</div>
    <div class="x-description">
      Conta dedicada aos adeptos do Sporting Clube de Portugal.
    </div>
    <a href="https://x.com/Sporting_CPAdep" target="_blank" class="x-button">
      Ver no X
    </a>
  </div>

  <!-- Sporting Oficial -->
  <div class="column x-card">
    <img src="/x.png" class="x-logo" alt="X">
    <div class="x-username">@SportingCP</div>
    <div class="x-description">
      Página oficial do Sporting Clube de Portugal.
    </div>
    <a href="https://x.com/SportingCP" target="_blank" class="x-button">
      Ver no X
    </a>
  </div>

  <!-- Sporting Orgulho -->
  <div class="column x-card">
    <img src="/x.png" class="x-logo" alt="X">
    <div class="x-username">@SportingOrgulho</div>
    <div class="x-description">
      Conteúdos e partilhas sobre o universo leonino.
    </div>
    <a href="https://x.com/SportingOrgulho" target="_blank" class="x-button">
      Ver no X
    </a>
  </div>

</div>

<script>
async function loadJournal(endpoint, coverId, newsId) {
  try {
    const response = await fetch(endpoint + "?t=" + new Date().getTime());
    const data = await response.json();

    const img = document.getElementById(coverId);

    if (data.cover) img.src = data.cover;

    if (data.coverLink) {
      img.onclick = () => window.open(data.coverLink, "_blank");
    }

    const newsContainer = document.getElementById(newsId);
    newsContainer.innerHTML = "";

    if (data.news && data.news.length > 0) {
      data.news.forEach(item => {
        const link = document.createElement("a");
        link.href = item.link;
        link.target = "_blank";
        link.textContent = item.title;
        newsContainer.appendChild(link);
      });
    }

  } catch (error) {
    console.error("Erro ao carregar:", endpoint, error);
  }
}

loadJournal("/api/record", "record-cover", "record-news");
loadJournal("/api/bola", "bola-cover", "bola-news");
loadJournal("/api/ojogo", "ojogo-cover", "ojogo-news");
</script>

</body>
</html>
