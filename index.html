<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Canal Sporting</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: linear-gradient(to bottom, #f5f7f6, #e8ecea);
  margin: 0;
  padding: 0;
  text-align: center;
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 6px;
  background: #0a5c2a;
}

h1 {
  color: #0a5c2a;
  margin: 40px 0 5px 0;
}

.last-update {
  font-size: 14px;
  color: #666;
  margin-bottom: 30px;
}

.section-title {
  color: #0a5c2a;
  margin: 40px 0 20px 0;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  flex-wrap: wrap;
  align-items: stretch;
}

.column {
  background: #ffffff;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  width: 360px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.column:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.12);
}

.column h3 {
  color: #0a5c2a;
  margin-bottom: 20px;
  font-size: 20px;
  font-weight: 700;
}

.column h3::after {
  content: "";
  display: block;
  width: 40px;
  height: 3px;
  background: #0a5c2a;
  margin: 8px auto 0 auto;
  border-radius: 2px;
}

.cover {
  width: 100%;
  max-height: 520px;
  object-fit: contain;
  margin-bottom: 20px;
  border-radius: 10px;
  cursor: pointer;
}

.news {
  text-align: left;
}

.news a {
  display: block;
  margin-bottom: 12px;
  padding: 10px 12px;
  background: #f7f9f8;
  border-radius: 10px;
  color: #0a5c2a;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  line-height: 1.4;
  transition: all 0.2s ease;
}

.news a:hover {
  background: #e2efe8;
  transform: translateX(4px);
}

.loading {
  color: #999;
  font-size: 14px;
  font-style: italic;
}

@media (max-width: 1100px) {
  .container {
    flex-direction: column;
    align-items: center;
  }

  .column {
    width: 90%;
    max-width: 420px;
  }
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>
<p class="last-update">
  Atualizado automaticamente • <span id="update-time"></span>
</p>

<h2 class="section-title">Jornais</h2>

<div class="container">

  <div class="column">
    <h3>Record</h3>
    <img id="record-cover" class="cover" src="/record.png" />
    <div id="record-news" class="news loading">A carregar notícias...</div>
  </div>

  <div class="column">
    <h3>A Bola</h3>
    <img id="bola-cover" class="cover" src="/abola.png" />
    <div id="bola-news" class="news loading">A carregar notícias...</div>
  </div>

  <div class="column">
    <h3>O Jogo</h3>
    <img id="ojogo-cover" class="cover" src="/ojogo.png" />
    <div id="ojogo-news" class="news loading">A carregar notícias...</div>
  </div>

</div>

<script>
document.getElementById("update-time").textContent =
  new Date().toLocaleTimeString("pt-PT");

async function loadJournal(endpoint, coverId, newsId) {
  try {
    const response = await fetch(endpoint + "?t=" + new Date().getTime());
    const data = await response.json();

    const img = document.getElementById(coverId);
    const newsContainer = document.getElementById(newsId);

    if (data.cover) img.src = data.cover;

    if (data.coverLink) {
      img.onclick = () => window.open(data.coverLink, "_blank");
    }

    newsContainer.innerHTML = "";

    if (data.news && data.news.length > 0) {
      data.news.slice(0, 3).forEach(item => {
        const link = document.createElement("a");
        link.href = item.link;
        link.target = "_blank";
        link.textContent = item.title;
        newsContainer.appendChild(link);
      });
    } else {
      newsContainer.innerHTML = "<p class='loading'>Sem notícias disponíveis</p>";
    }

  } catch (error) {
    document.getElementById(newsId).innerHTML =
      "<p class='loading'>Erro ao carregar</p>";
  }
}

loadJournal("/api/record", "record-cover", "record-news");
loadJournal("/api/bola", "bola-cover", "bola-news");
loadJournal("/api/ojogo", "ojogo-cover", "ojogo-news");
</script>

</body>
</html>
