<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jogos - Canal Sporting</title>

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
  font-size: 14px;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= LAYOUT ================= */

.layout {
  max-width: 1300px;
  margin: 40px auto;
  padding: 0 25px 60px 25px;
  display: grid;
  grid-template-columns: 320px 1fr 300px;
  gap: 35px;
}

.section {
  background: white;
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.section h2 {
  margin-top: 0;
  font-size: 18px;
}

/* ================= MATCH ================= */

.match {
  display: grid;
  grid-template-columns: 120px 1fr;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.match:last-child {
  border-bottom: none;
}

.match-time {
  font-size: 12px;
  color: #777;
}

.match-main {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.team-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.team-logo {
  width: 18px;
  height: 18px;
}

.score {
  margin-left: auto;
  font-weight: bold;
}

.sporting {
  font-weight: bold;
  color: #0a5c2a;
}

.derby {
  background: #fff5f5;
  border-left: 3px solid #cc0000;
  padding-left: 8px;
}

.derby-badge {
  background: #cc0000;
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
}

/* ================= TABLE ================= */

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 6px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.highlight {
  background: #e6f5ec;
  font-weight: bold;
}

/* ================= RESPONSIVO ================= */

@media (max-width: 1100px) {
  .layout {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<header class="main-header">
  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>
  <nav class="header-nav">
    <a href="/" id="nav-feed">Feed</a>
    <a href="/jogos.html" id="nav-jogos">Jogos</a>
    <a href="/mercado.html" id="nav-mercado">Transferências</a>
  </nav>
</header>

<div class="layout">

  <!-- CLASSIFICAÇÕES -->
  <div>
    <div class="section">
      <h2>Primeira Liga</h2>
      <div id="ligaContainer"></div>
    </div>

    <div class="section" style="margin-top:25px;">
      <h2>UEFA Champions League</h2>
      <div id="championsContainer"></div>
    </div>
  </div>

  <!-- JOGOS -->
  <div>
    <div class="section">
      <h2>Agenda</h2>
      <div id="agendaContainer"></div>
    </div>

    <div class="section" style="margin-top:25px;">
      <h2>Resultados</h2>
      <div id="resultadosContainer"></div>
    </div>
  </div>

  <!-- ESTATÍSTICAS -->
  <div>
    <div class="section">
      <h2>Estatísticas da Equipa</h2>
      <div id="estatisticasContainer"></div>
    </div>
  </div>

</div>

<script>

/* ================= DATA ================= */

function formatarData(d) {
  const date = new Date(d);
  const dia = String(date.getDate()).padStart(2,"0");
  const mes = String(date.getMonth()+1).padStart(2,"0");
  const ano = String(date.getFullYear()).slice(-2);
  const hora = String(date.getHours()).padStart(2,"0");
  const min = String(date.getMinutes()).padStart(2,"0");
  return `${dia}/${mes}/${ano}, ${hora}:${min}`;
}

/* ================= DERBY ================= */

function isDerby(home, away) {
  return (
    (home === "Sporting Clube de Portugal" && 
     (away === "FC Porto" || away === "Sport Lisboa e Benfica")) ||
    (away === "Sporting Clube de Portugal" && 
     (home === "FC Porto" || home === "Sport Lisboa e Benfica"))
  );
}

/* ================= JOGOS ================= */

async function carregarJogos() {

  const res = await fetch("/api/jogos");
  const data = await res.json();

  const proximos = [...data.porJogar]
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  const anteriores = [...data.jogados]
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  render(proximos, "agendaContainer", false);
  render(anteriores, "resultadosContainer", true);
}

function render(lista, containerId, mostrarResultado) {

  const container = document.getElementById(containerId);
  container.innerHTML = "";

  lista.forEach(j => {

    const sportingHome = j.homeTeam === "Sporting Clube de Portugal";
    const sportingAway = j.awayTeam === "Sporting Clube de Portugal";
    const derby = isDerby(j.homeTeam, j.awayTeam);

    container.innerHTML += `
      <div class="match ${derby ? "derby" : ""}">

        <div class="match-time">
          ${formatarData(j.date)}
        </div>

        <div class="match-main">

          <div class="team-row ${sportingHome ? "sporting" : ""}">
            <img src="${j.homeCrest}" class="team-logo">
            ${j.homeTeam}
            ${mostrarResultado ? `<span class="score">${j.score.home}</span>` : ""}
          </div>

          <div class="team-row ${sportingAway ? "sporting" : ""}">
            <img src="${j.awayCrest}" class="team-logo">
            ${j.awayTeam}
            ${mostrarResultado ? `<span class="score">${j.score.away}</span>` : ""}
          </div>

          ${derby ? `<span class="derby-badge">CLÁSSICO</span>` : ""}

        </div>

      </div>
    `;
  });
}

/* ================= CLASSIFICAÇÕES ================= */

async function carregarClassificacoes() {

  const res = await fetch("/api/classificacao");
  const data = await res.json();

  function tabela(lista) {
    return `
      <table>
        <tr>
          <th>#</th><th>Equipa</th><th>J</th>
          <th>V</th><th>E</th><th>D</th>
          <th>DG</th><th>Pts</th>
        </tr>
        ${lista.map(t => `
          <tr class="${t.team === "Sporting Clube de Portugal" ? "highlight" : ""}">
            <td>${t.position}</td>
            <td>${t.team}</td>
            <td>${t.played}</td>
            <td>${t.won}</td>
            <td>${t.draw}</td>
            <td>${t.lost}</td>
            <td>${t.goalDifference}</td>
            <td>${t.points}</td>
          </tr>
        `).join("")}
      </table>
    `;
  }

  if (data["Primeira Liga"])
    document.getElementById("ligaContainer").innerHTML =
      tabela(data["Primeira Liga"]);

  if (data["UEFA Champions League"])
    document.getElementById("championsContainer").innerHTML =
      tabela(data["UEFA Champions League"]);
}

/* ================= ESTATÍSTICAS ================= */

async function carregarEstatisticas() {

  const res = await fetch("/api/jogos");
  const data = await res.json();

  const jogos = data.jogados;

  let golos = 0;
  let sofridos = 0;

  jogos.forEach(j => {

    const home = j.homeTeam === "Sporting Clube de Portugal";

    golos += home ? j.score.home : j.score.away;
    sofridos += home ? j.score.away : j.score.home;

  });

  document.getElementById("estatisticasContainer").innerHTML = `
    <div><strong>Total Golos:</strong> ${golos}</div>
    <div><strong>Total Sofridos:</strong> ${sofridos}</div>
  `;
}

/* ================= INIT ================= */

carregarJogos();
carregarClassificacoes();
carregarEstatisticas();

const path = window.location.pathname;

if (path.includes("jogos")) {
  document.getElementById("nav-jogos")?.classList.add("active");
}

</script>

</body>
</html>
