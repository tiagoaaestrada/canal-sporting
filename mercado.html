<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transferências - Canal Sporting</title>

<style>

  /* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 15px 0 5px 0;
  text-align: center;
}

.header-title a {
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 10px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

@media (max-width: 768px) {
  .header-nav {
    gap: 18px;
    font-size: 14px;
  }
}
  
  body {
  font-family: Arial;
  background: #f5f7f6;
  margin: 0;
  font-size: 13px;
}

h1 {
  text-align: center;
  color: #0a5c2a;
  margin: 15px 0;
}

.top-nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: white;
  padding: 8px;
  border-bottom: 1px solid #eee;
}

.top-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #0a5c2a;
}

.layout {
  display: grid;
  grid-template-columns: 1fr 1.3fr 1fr;
  gap: 25px;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.section {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
}

.section h2 {
  font-size: 16px;
  margin-top: 0;
}

/* ================= FLASH MATCH ================= */

.match {
  display: grid;
  grid-template-columns: 110px 1fr;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
  align-items: center;
}

.match-time {
  font-size: 11px;
  color: #666;
}

.match-main {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.team-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.team-logo {
  width: 16px;
  height: 16px;
}

.score {
  margin-left: auto;
  font-weight: bold;
}

.sporting {
  font-weight: bold;
  color: #0a5c2a;
}

.venue {
  font-size: 11px;
  color: #888;
}

.derby {
  background: #fff5f5;
  border-left: 3px solid #cc0000;
  padding-left: 6px;
}

.derby-badge {
  background: #cc0000;
  color: white;
  font-size: 9px;
  padding: 2px 4px;
  border-radius: 3px;
  margin-left: 6px;
}

/* ================= TABLE ================= */

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  padding: 4px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.highlight {
  background: #e6f5ec;
  font-weight: bold;
}
  
.marcador-item {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid #eee;
  font-size: 12px;
}

.marcador-competition {
  margin-top: 10px;
  font-weight: bold;
  font-size: 12px;
}

.mobile-tabs {
  display: none;
}

.mobile-tabs button {
  flex: 1;
  background: none;
  border: none;
  padding: 12px;
  font-weight: 600;
  color: #0a5c2a;
}

.mobile-tabs button.active {
  border-bottom: 3px solid #0a5c2a;
}
  
@media (max-width: 1000px) {

  .layout {
    grid-template-columns: 1fr;
  }

  .mobile-tabs {
    display: flex;
    background: white;
    border-bottom: 1px solid #eee;
  }

}
  
@media (max-width: 1000px) {
  .layout {
    grid-template-columns: 1fr;
  }
}

/* MOBILE TABS FIX */

@media (max-width: 1000px) {

  .mobile-hide {
    display: none !important;
  }

}

</style>

  
</head>

<body>
  
<header class="main-header">

  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>

  <nav class="header-nav">
    <a href="/" id="nav-feed">Feed</a>
    <a href="/jogos.html" id="nav-jogos">Jogos</a>
    <a href="/mercado.html" id="nav-mercado">Transferências</a>
  </nav>

</header>

<div class="container">

  <div class="mercado-section">
    <h3>Sporting</h3>
    <div id="mercado-sporting"></div>
  </div>

  <div class="mercado-section">
    <h3>Nacional</h3>
    <div id="mercado-nacional"></div>
  </div>

  <div class="mercado-section">
    <h3>Internacional</h3>
    <div id="mercado-internacional"></div>
  </div>

</div>

<script>
async function loadMercado() {
  const res = await fetch("/api/mercado");
  const data = await res.json();

  ["sporting","nacional","internacional"].forEach(section => {
    const container = document.getElementById("mercado-"+section);
    container.innerHTML = "";
    data[section].forEach(item => {
      const a = document.createElement("a");
      a.href = item.link;
      a.target = "_blank";
      a.textContent = `${item.title} (${item.formattedDate})`;
      container.appendChild(a);
    });
  });
}

loadMercado();

/* ================= NAV ACTIVE ================= */

const path = window.location.pathname;

if (path === "/" || path === "/index.html") {
  document.getElementById("nav-feed")?.classList.add("active");
}

if (path.includes("jogos")) {
  document.getElementById("nav-jogos")?.classList.add("active");
}

if (path.includes("mercado")) {
  document.getElementById("nav-mercado")?.classList.add("active");
}
  
</script>

</body>
</html>
