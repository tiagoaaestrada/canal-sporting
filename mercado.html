<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transferências - Canal Sporting</title>

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= CONTAINER ================= */

.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px 60px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

/* ================= SECTION TITLE ================= */

.section-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #0a5c2a;
  border-bottom: 2px solid #0a5c2a;
  padding-bottom: 5px;
}

/* ================= CARD ================= */

.mercado-card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  margin-bottom: 25px;
  overflow: hidden;
}

.card-top {
  display: flex;
  gap: 18px;
  padding: 20px;
  align-items: center;
}

.player-photo {
  width: 85px;
  height: 85px;
  border-radius: 16px;
  object-fit: cover;
  background: #eee;
}

.player-info h2 {
  margin: 0 0 6px 0;
  font-size: 18px;
  color: #0a5c2a;
}

.player-info div {
  font-size: 13px;
  color: #666;
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  font-size: 11px;
  font-weight: bold;
  border-radius: 6px;
  margin-top: 6px;
}

.badge.oficial {
  background: #0a5c2a;
  color: white;
}

.badge.rumor {
  background: #f5b400;
  color: black;
}

.card-divider {
  border-top: 1px solid #eee;
}

.card-bottom {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
  padding: 18px 0;
}

.club-logo {
  width: 55px;
  height: 55px;
  object-fit: contain;
}

.transfer-arrow {
  font-size: 22px;
  color: #0a5c2a;
}

.card-link {
  display: block;
  text-align: center;
  padding: 12px;
  background: #f7f7f7;
  text-decoration: none;
  font-weight: 600;
  color: #333;
}

.card-link:hover {
  background: #0a5c2a;
  color: white;
}

/* ================= MOBILE ================= */

@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<header class="main-header">
  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>
  <nav class="header-nav">
    <a href="/">Feed</a>
    <a href="/jogos.html">Jogos</a>
    <a href="/mercado.html" class="active">Transferências</a>
  </nav>
</header>

<div class="container">

  <div>
    <div class="section-title">Entradas</div>
    <div id="entradas"></div>
  </div>

  <div>
    <div class="section-title">Saídas</div>
    <div id="saidas"></div>
  </div>

</div>

<script>

async function loadMercado() {

  const res = await fetch("/api/mercado");
  const data = await res.json();

  const todos = [
    ...(data.sporting || []),
    ...(data.nacional || []),
    ...(data.internacional || [])
  ];

  const entradasContainer = document.getElementById("entradas");
  const saidasContainer = document.getElementById("saidas");

  entradasContainer.innerHTML = "";
  saidasContainer.innerHTML = "";

  todos.forEach(item => {

    const tipo = item.type || "entrada"; 
    const status = item.status || "rumor";

    const card = document.createElement("div");
    card.className = "mercado-card";

    card.innerHTML = `
      <div class="card-top">
        <img src="${item.playerPhoto || '/player-placeholder.png'}" class="player-photo">

        <div class="player-info">
          <h2>${item.title}</h2>
          <div>${item.formattedDate}</div>
          <span class="badge ${status}">
            ${status === "oficial" ? "OFICIAL" : "RUMOR"}
          </span>
        </div>
      </div>

      <div class="card-divider"></div>

      <div class="card-bottom">
        <img src="${item.fromLogo || '/club.png'}" class="club-logo">
        <div class="transfer-arrow">➜</div>
        <img src="${item.toLogo || '/scp.png'}" class="club-logo">
      </div>

      <a href="${item.link}" target="_blank" class="card-link">
        Ver notícia completa
      </a>
    `;

    if (tipo === "saida") {
      saidasContainer.appendChild(card);
    } else {
      entradasContainer.appendChild(card);
    }

  });

}

loadMercado();

</script>

</body>
</html>
