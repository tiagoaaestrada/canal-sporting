<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transferências - Canal Sporting</title>

<style>

/* ================= GLOBAL ================= */

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f7f6;
  margin: 0;
  font-size: 14px;
}

/* ================= HEADER ================= */

.main-header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 18px 0 8px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-title a {
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
  color: #0a5c2a;
}

.header-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
}

.header-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #666;
  padding-bottom: 6px;
}

.header-nav a.active {
  color: #0a5c2a;
  border-bottom: 3px solid #0a5c2a;
}

/* ================= CONTAINER ================= */

.container {
  max-width: 950px;
  margin: 40px auto;
  padding: 0 20px 60px 20px;
}

/* ================= MERCADO CARDS ================= */

.mercado-card {
  background: white;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  margin-bottom: 30px;
  overflow: hidden;
  transition: transform 0.2s ease;
}

.mercado-card:hover {
  transform: translateY(-3px);
}

.card-top {
  display: flex;
  gap: 18px;
  padding: 22px;
  align-items: center;
}

.player-photo {
  width: 90px;
  height: 90px;
  border-radius: 16px;
  background: #eaeaea;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:#999;
}

.player-info h2 {
  margin: 0 0 6px 0;
  font-size: 20px;
  color: #1f6f8b;
  line-height:1.3;
}

.player-info div {
  font-size: 13px;
  color: #555;
}

.card-divider {
  border-top: 1px solid #eee;
}

.card-bottom {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  padding: 25px 0;
}

.club-placeholder {
  width: 70px;
  height: 70px;
  background: #f0f0f0;
  border-radius: 12px;
}

.transfer-arrow {
  font-size: 28px;
  color: #1f6f8b;
}

.card-link {
  display: block;
  text-align: center;
  padding: 14px;
  background: #f7f7f7;
  text-decoration: none;
  font-weight: 600;
  color: #333;
  border-top: 1px solid #eee;
  transition: background 0.2s ease;
}

.card-link:hover {
  background: #e6f5ec;
  color: #0a5c2a;
}

/* MOBILE */

@media (max-width: 768px) {

  .card-top {
    flex-direction: column;
    text-align: center;
  }

  .card-bottom {
    flex-direction: column;
    gap: 15px;
  }

}

</style>
</head>

<body>

<header class="main-header">
  <div class="header-title">
    <a href="/">Canal Sporting</a>
  </div>
  <nav class="header-nav">
    <a href="/">Feed</a>
    <a href="/jogos.html">Jogos</a>
    <a href="/mercado.html" class="active">Transferências</a>
  </nav>
</header>

<div class="container">
  <div id="mercadoCards">A carregar...</div>
</div>

<script>

async function loadMercado() {

  try {

    const res = await fetch("/api/mercado");
    const data = await res.json();

    const container = document.getElementById("mercadoCards");
    container.innerHTML = "";

    const todos = [
      ...(data.sporting || []),
      ...(data.nacional || []),
      ...(data.internacional || [])
    ];

    if (!todos.length) {
      container.innerHTML = "<div style='color:#777;'>Sem rumores disponíveis.</div>";
      return;
    }

    todos.forEach(item => {

      const card = document.createElement("div");
      card.className = "mercado-card";

      card.innerHTML = `
        <div class="card-top">
          <div class="player-photo">📰</div>

          <div class="player-info">
            <h2>${item.title}</h2>
            <div><strong>Data:</strong> ${item.formattedDate}</div>
            <div><strong>Categoria:</strong> Mercado</div>
          </div>
        </div>

        <div class="card-divider"></div>

        <div class="card-bottom">
          <div class="club-placeholder"></div>
          <div class="transfer-arrow">➜</div>
          <div class="club-placeholder"></div>
        </div>

        <a href="${item.link}" target="_blank" class="card-link">
          Ver notícia completa
        </a>
      `;

      container.appendChild(card);
    });

  } catch (err) {
    document.getElementById("mercadoCards").innerHTML =
      "<div style='color:red;'>Erro ao carregar mercado.</div>";
  }
}

loadMercado();

</script>

</body>
</html>
