<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<title>Canal Sporting</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 0;
  text-align: center;
}

h1 {
  color: #0a5c2a;
  margin: 30px 0 10px 0;
}

.top-bar {
  margin-bottom: 20px;
}

#last-update {
  font-size: 14px;
  color: #555;
  margin-bottom: 10px;
}

button {
  padding: 8px 16px;
  background-color: #0a5c2a;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  flex-wrap: wrap;
  align-items: flex-start;
}

.column {
  background: #f3f3f3;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  width: 360px;
}

.column h2 {
  color: #0a5c2a;
  margin-bottom: 10px;
}

.edition-date {
  font-size: 13px;
  color: #777;
  margin-bottom: 15px;
}

.column img {
  width: 100%;
  height: auto;
  max-height: 520px;
  object-fit: contain;
  display: block;
  margin: 0 auto 20px auto;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.column img:hover {
  transform: scale(1.02);
}

.news {
  text-align: left;
}

.news a {
  display: block;
  margin-bottom: 12px;
  color: #0a5c2a;
  text-decoration: none;
  font-weight: bold;
  line-height: 1.4;
}

.news a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>

<div class="top-bar">
  <div id="last-update"></div>
  <button onclick="reloadAll()">🔄 Atualizar agora</button>
</div>

<div class="container">

  <div class="column">
    <h2>Record</h2>
    <div class="edition-date" id="record-date"></div>
    <img id="record-cover" src="/record.png" />
    <div id="record-news" class="news"></div>
  </div>

  <div class="column">
    <h2>A Bola</h2>
    <div class="edition-date" id="bola-date"></div>
    <img id="bola-cover" src="/abola.png" />
    <div id="bola-news" class="news"></div>
  </div>

  <div class="column">
    <h2>O Jogo</h2>
    <div class="edition-date" id="ojogo-date"></div>
    <img id="ojogo-cover" src="/ojogo.png" />
    <div id="ojogo-news" class="news"></div>
  </div>

</div>

<script>

function getTodayFormatted() {
  const today = new Date();
  return today.toLocaleDateString("pt-PT", {
    day: "2-digit",
    month: "long",
    year: "numeric"
  });
}

function updateLastUpdateTime() {
  const now = new Date();
  const time = now.toLocaleTimeString("pt-PT", {
    hour: "2-digit",
    minute: "2-digit"
  });

  document.getElementById("last-update").textContent =
    "Última atualização: " + time;
}

async function loadJournal(endpoint, coverId, newsId, dateId) {
  try {
    const response = await fetch(endpoint + "?t=" + new Date().getTime());
    const data = await response.json();

    const img = document.getElementById(coverId);
    const newsContainer = document.getElementById(newsId);
    const dateElement = document.getElementById(dateId);

    // Data da edição (hoje)
    dateElement.textContent = "Edição de " + getTodayFormatted();

    if (data.cover) {
      img.src = data.cover;
    }

    if (data.coverLink) {
      img.onclick = () => {
        window.open(data.coverLink, "_blank");
      };
    }

    newsContainer.innerHTML = "";

    if (data.news && data.news.length > 0) {
      data.news.forEach(item => {
        const link = document.createElement("a");
        link.href = item.link;
        link.target = "_blank";
        link.textContent = item.title;
        newsContainer.appendChild(link);
      });
    }

  } catch (error) {
    console.error("Erro ao carregar:", endpoint, error);
  }
}

function reloadAll() {
  loadAll();
}

function loadAll() {
  loadJournal("/api/record", "record-cover", "record-news", "record-date");
  loadJournal("/api/bola", "bola-cover", "bola-news", "bola-date");
  loadJournal("/api/ojogo", "ojogo-cover", "ojogo-news", "ojogo-date");
  updateLastUpdateTime();
}

// Inicial
loadAll();

</script>

</body>
</html>
