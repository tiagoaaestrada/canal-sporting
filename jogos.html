<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jogos - Canal Sporting</title>

<style>
body {
  font-family: Arial;
  background: #f5f7f6;
  margin: 0;
  padding: 0;
}

h1 {
  text-align: center;
  color: #0a5c2a;
  margin: 20px 0;
}

.top-nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: white;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.top-nav a {
  text-decoration: none;
  font-weight: 600;
  color: #0a5c2a;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.section {
  background: white;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 30px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.jogo-item {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  font-size: 15px;
}

.jogo-item:last-child {
  border-bottom: none;
}

.resultado {
  font-weight: bold;
  color: #0a5c2a;
}

.competicao {
  color: #555;
}

.data {
  color: #777;
  font-size: 14px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  margin-top: 10px;
}

th, td {
  padding: 6px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.highlight {
  background: #e6f5ec;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>

<div class="top-nav">
  <a href="/">Feed</a>
  <a href="/jogos.html">Jogos</a>
  <a href="/mercado.html">Transferências</a>
</div>

<div class="container">

  <div class="section">
    <h2>Próximos Jogos</h2>
    <div id="porJogarContainer"></div>
  </div>

  <div class="section">
    <h2>Jogos Realizados</h2>
    <div id="jogadosContainer"></div>
  </div>

  <div class="section">
    <h2>Classificações</h2>
    <div id="classificacaoContainer"></div>
  </div>

</div>

<script>

/* FORMATAR DATA */
function formatarData(dateString) {
  const date = new Date(dateString);

  const meses = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];

  const dia = String(date.getDate()).padStart(2,"0");
  const mes = meses[date.getMonth()];
  const ano = String(date.getFullYear()).slice(-2);
  const horas = String(date.getHours()).padStart(2,"0");
  const minutos = String(date.getMinutes()).padStart(2,"0");

  return `${dia}/${mes}/${ano} ${horas}h${minutos}`;
}

/* JOGOS */
async function carregarJogos() {
  const res = await fetch("/api/jogos");
  const data = await res.json();

  const porJogarDiv = document.getElementById("porJogarContainer");
  const jogadosDiv = document.getElementById("jogadosContainer");

  porJogarDiv.innerHTML = "";
  jogadosDiv.innerHTML = "";

  const proximos = Object.values(data.porJogar).flat();
  proximos.sort((a, b) => new Date(a.date) - new Date(b.date));

  proximos.forEach(jogo => {
    porJogarDiv.innerHTML += `
      <div class="jogo-item">
        ${jogo.homeTeam} vs ${jogo.awayTeam}
        - <span class="competicao">${jogo.competition}</span>
        - <span class="data">${formatarData(jogo.date)}</span>
      </div>
    `;
  });

  const jogados = Object.values(data.jogados).flat();
  jogados.sort((a, b) => new Date(b.date) - new Date(a.date));

  jogados.forEach(jogo => {
    jogadosDiv.innerHTML += `
      <div class="jogo-item">
        ${jogo.homeTeam}
        <span class="resultado">${jogo.score.home} - ${jogo.score.away}</span>
        ${jogo.awayTeam}
        - <span class="competicao">${jogo.competition}</span>
        - <span class="data">${formatarData(jogo.date)}</span>
      </div>
    `;
  });
}

/* CLASSIFICAÇÃO */
async function carregarClassificacao() {
  const res = await fetch("/api/classificacao");
  const data = await res.json();

  const container = document.getElementById("classificacaoContainer");
  container.innerHTML = "";

  Object.keys(data).forEach(comp => {

    container.innerHTML += `<h3>${comp}</h3>`;

    let table = `
      <table>
        <tr>
          <th>#</th>
          <th>Equipa</th>
          <th>J</th>
          <th>Pts</th>
        </tr>
    `;

    data[comp].forEach(team => {
      const highlight = team.team === "Sporting Clube de Portugal" ? "highlight" : "";
      table += `
        <tr class="${highlight}">
          <td>${team.position}</td>
          <td>${team.team}</td>
          <td>${team.played}</td>
          <td>${team.points}</td>
        </tr>
      `;
    });

    table += `</table>`;
    container.innerHTML += table;
  });
}

carregarJogos();
carregarClassificacao();

setInterval(() => {
  carregarJogos();
  carregarClassificacao();
}, 300000);

</script>

</body>
</html>
