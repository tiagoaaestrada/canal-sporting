<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<title>Canal Sporting</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 0;
  text-align: center;
}

h1 {
  color: #0a5c2a;
  margin: 40px 0 5px 0;
}

.section-title {
  color: #0a5c2a;
  margin: 40px 0 20px 0;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  flex-wrap: wrap;
  align-items: flex-start;
}

.column {
  background: #ffffff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  width: 360px;
}

.column h3 {
  color: #0a5c2a;
  margin-bottom: 15px;
}

.cover {
  width: 100%;
  height: auto;
  max-height: 520px;
  object-fit: contain;
  margin-bottom: 20px;
  border-radius: 6px;
  cursor: pointer;
}

.news {
  text-align: left;
}

.news a {
  display: block;
  margin-bottom: 10px;
  color: #0a5c2a;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
  line-height: 1.4;
}

.news a:hover {
  text-decoration: underline;
}

/* X header */
.x-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
}

.x-header img {
  width: 22px;
  height: 22px;
}

.x-header a {
  text-decoration: none;
  color: #0a5c2a;
  font-weight: bold;
  font-size: 18px;
}

@media (max-width: 1100px) {
  .container {
    flex-direction: column;
    align-items: center;
  }

  .column {
    width: 90%;
    max-width: 420px;
  }
}
</style>
</head>

<body>

<h1>Canal Sporting</h1>

<h2 class="section-title">Jornais</h2>

<div class="container">

  <div class="column">
    <h3>Record</h3>
    <img id="record-cover" class="cover" src="/record.png" />
    <div id="record-news" class="news"></div>
  </div>

  <div class="column">
    <h3>A Bola</h3>
    <img id="bola-cover" class="cover" src="/abola.png" />
    <div id="bola-news" class="news"></div>
  </div>

  <div class="column">
    <h3>O Jogo</h3>
    <img id="ojogo-cover" class="cover" src="/ojogo.png" />
    <div id="ojogo-news" class="news"></div>
  </div>

</div>

<h2 class="section-title">Canais X</h2>

<div class="container">

  <!-- Sporting Adeptos -->
  <div class="column">
    <div class="x-header">
      <img src="/x.png" alt="X">
      <a href="https://x.com/Sporting_CPAdep" target="_blank">
        @Sporting_CPAdep
      </a>
    </div>

    <blockquote class="twitter-timeline"
      data-height="500"
      data-chrome="noheader nofooter noborders"
      href="https://twitter.com/Sporting_CPAdep">
      Tweets by Sporting_CPAdep
    </blockquote>
  </div>

  <!-- Sporting Oficial -->
  <div class="column">
    <div class="x-header">
      <img src="/x.png" alt="X">
      <a href="https://x.com/SportingCP" target="_blank">
        @SportingCP
      </a>
    </div>

    <blockquote class="twitter-timeline"
      data-height="500"
      data-chrome="noheader nofooter noborders"
      href="https://twitter.com/SportingCP">
      Tweets by SportingCP
    </blockquote>
  </div>

  <!-- Sporting Orgulho -->
  <div class="column">
    <div class="x-header">
      <img src="/x.png" alt="X">
      <a href="https://x.com/SportingOrgulho" target="_blank">
        @SportingOrgulho
      </a>
    </div>

    <blockquote class="twitter-timeline"
      data-height="500"
      data-chrome="noheader nofooter noborders"
      href="https://twitter.com/SportingOrgulho">
      Tweets by SportingOrgulho
    </blockquote>
  </div>

</div>

<!-- Script oficial do X -->
<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

<script>
async function loadJournal(endpoint, coverId, newsId) {
  try {
    const response = await fetch(endpoint + "?t=" + new Date().getTime());
    const data = await response.json();

    const img = document.getElementById(coverId);

    if (data.cover) img.src = data.cover;

    if (data.coverLink) {
      img.onclick = () => window.open(data.coverLink, "_blank");
    }

    const newsContainer = document.getElementById(newsId);
    newsContainer.innerHTML = "";

    if (data.news && data.news.length > 0) {
      data.news.forEach(item => {
        const link = document.createElement("a");
        link.href = item.link;
        link.target = "_blank";
        link.textContent = item.title;
        newsContainer.appendChild(link);
      });
    }

  } catch (error) {
    console.error("Erro ao carregar:", endpoint, error);
  }
}

loadJournal("/api/record", "record-cover", "record-news");
loadJournal("/api/bola", "bola-cover", "bola-news");
loadJournal("/api/ojogo", "ojogo-cover", "ojogo-news");
</script>

</body>
</html>
